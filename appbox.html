<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>TV | Canales</title>
<style>
:root{
  --bg:#080f1a;
  --surface:#0d1929;
  --card:#0f1e30;
  --card-hover:#152540;
  --border:rgba(255,255,255,.08);
  --border-hover:rgba(255,255,255,.18);
  --text:#e8f4ff;
  --muted:rgba(232,244,255,.55);
  --accent:#00c8e8;
  --accent2:#7c5cbf;
  --topH:60px;
  --sideW:72px;
  --radius:14px;
  --trans:.18s ease;
}
body.light{
  --bg:#f0f4fa;
  --surface:#ffffff;
  --card:#ffffff;
  --card-hover:#f0f6ff;
  --border:rgba(0,0,0,.08);
  --border-hover:rgba(0,100,200,.25);
  --text:#0d1726;
  --muted:rgba(13,23,38,.55);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
  background:var(--bg);
  color:var(--text);
}

/* TOPBAR */
.topbar{
  position:fixed;top:0;left:0;right:0;
  height:var(--topH);
  display:flex;align-items:center;gap:10px;
  padding:0 16px;
  background:rgba(8,15,26,.92);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  z-index:50;
}
body.light .topbar{ background:rgba(255,255,255,.92); }

.logo-dot{
  width:32px;height:32px;border-radius:10px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;
  font-weight:900;font-size:13px;color:#fff;flex-shrink:0;
}
.app-title{
  font-weight:800;font-size:15px;letter-spacing:-.2px;
  flex-shrink:0;
}
.breadcrumb{
  display:flex;align-items:center;gap:6px;
  font-size:13px;color:var(--muted);
  overflow:hidden;
}
.breadcrumb .sep{opacity:.4}
.breadcrumb .bc-item{
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  max-width:160px;
  cursor:pointer;
}
.breadcrumb .bc-item.last{color:var(--text);font-weight:700;}
.breadcrumb .bc-item:not(.last):hover{color:var(--accent);}

.search-wrap{margin-left:auto;position:relative;}
.search-wrap svg{
  position:absolute;left:10px;top:50%;transform:translateY(-50%);
  opacity:.45;pointer-events:none;
}
.search{
  padding:8px 10px 8px 32px;
  border-radius:10px;border:1px solid var(--border);
  background:rgba(255,255,255,.06);
  color:var(--text);font-size:13px;font-weight:600;
  outline:none;width:220px;transition:var(--trans);
}
body.light .search{background:rgba(0,0,0,.05);}
.search:focus{border-color:rgba(0,200,232,.5);width:260px;background:rgba(0,200,232,.05);}
.search::placeholder{color:var(--muted);}

.btn-theme{
  width:36px;height:36px;border-radius:10px;
  border:1px solid var(--border);background:transparent;
  color:var(--text);cursor:pointer;font-size:16px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:var(--trans);
}
.btn-theme:hover{background:rgba(255,255,255,.08);}

/* ICON SIDEBAR */
.sidebar{
  position:fixed;top:var(--topH);left:0;bottom:0;
  width:var(--sideW);
  display:flex;flex-direction:column;align-items:center;
  padding:14px 0;gap:8px;
  background:rgba(8,15,26,.7);
  backdrop-filter:blur(8px);
  border-right:1px solid var(--border);
  z-index:40;overflow:hidden;
}
body.light .sidebar{background:rgba(255,255,255,.85);}

.side-btn{
  width:48px;height:48px;border-radius:14px;
  border:1px solid transparent;background:transparent;
  color:var(--muted);cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;font-size:9px;font-weight:800;letter-spacing:.3px;text-transform:uppercase;
  transition:var(--trans);outline:none;
}
.side-btn svg{width:20px;height:20px;opacity:.7;transition:var(--trans);}
.side-btn:hover,.side-btn:focus{
  background:rgba(0,200,232,.1);
  border-color:rgba(0,200,232,.3);
  color:var(--accent);
}
.side-btn:hover svg,.side-btn:focus svg{opacity:1;}
.side-btn.active{
  background:linear-gradient(135deg,rgba(0,200,232,.18),rgba(124,92,191,.18));
  border-color:rgba(0,200,232,.5);
  color:var(--accent);
}
.side-btn.active svg{opacity:1;}

.side-footer{
  margin-top:auto;padding-top:14px;border-top:1px solid var(--border);
  width:100%;display:flex;flex-direction:column;align-items:center;gap:6px;
  font-size:9px;font-weight:800;color:var(--muted);
}
.side-footer .sub-dot{
  width:8px;height:8px;border-radius:50%;background:#22c55e;
  box-shadow:0 0 0 3px rgba(34,197,94,.2);
}
.side-footer .sub-dot.warn{background:#f59e0b;box-shadow:0 0 0 3px rgba(245,158,11,.2);}
.side-footer .sub-dot.danger{background:#ef4444;box-shadow:0 0 0 3px rgba(239,68,68,.2);}

/* MAIN */
.main{
  position:fixed;
  top:var(--topH);left:var(--sideW);right:0;bottom:0;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  scroll-behavior:smooth;
}

/* SECTION HEADER */
.section-header{
  padding:20px 20px 10px;
  display:flex;align-items:center;justify-content:space-between;
  gap:12px;flex-wrap:wrap;
}
.section-title{
  font-size:22px;font-weight:800;letter-spacing:-.4px;
}
.section-title span{
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
.section-meta{font-size:13px;color:var(--muted);font-weight:600;}

/* SUBCATEGORY CHIPS */
.chips-wrap{
  padding:0 20px 16px;
  display:flex;gap:8px;flex-wrap:wrap;
}
.chip{
  padding:6px 14px;border-radius:20px;
  border:1px solid var(--border);
  background:rgba(255,255,255,.05);
  color:var(--muted);font-size:12px;font-weight:700;
  cursor:pointer;transition:var(--trans);white-space:nowrap;
  outline:none;
}
body.light .chip{background:rgba(0,0,0,.05);}
.chip:hover,.chip:focus{
  background:rgba(0,200,232,.1);
  border-color:rgba(0,200,232,.4);
  color:var(--accent);
}
.chip.active{
  background:linear-gradient(135deg,rgba(0,200,232,.2),rgba(124,92,191,.15));
  border-color:var(--accent);
  color:var(--accent);
  box-shadow:0 0 0 2px rgba(0,200,232,.15);
}
.chip-count{
  display:inline-block;
  background:rgba(0,200,232,.2);color:var(--accent);
  font-size:10px;font-weight:800;
  padding:1px 6px;border-radius:9px;
  margin-left:4px;
}

/* GRID */
.grid{
  padding:0 20px 20px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:12px;
}
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  cursor:pointer;outline:none;
  position:relative;overflow:hidden;
  transition:var(--trans);
  aspect-ratio:2/3;
  display:flex;flex-direction:column;
}
.card:hover,.card:focus{
  border-color:rgba(0,200,232,.5);
  background:var(--card-hover);
  transform:translateY(-2px);
  box-shadow:0 8px 24px rgba(0,200,232,.12);
}
.card.active-focus{
  border-color:var(--accent);
  box-shadow:0 0 0 2px rgba(0,200,232,.25);
}
.card-poster{
  flex:1;overflow:hidden;
  background:rgba(255,255,255,.04);
  position:relative;
  display:flex;align-items:center;justify-content:center;
}
.card-poster img{
  width:100%;height:100%;object-fit:contain;
  display:block;transition:var(--trans);
}
.card:hover .card-poster img,.card:focus .card-poster img{transform:scale(1.04);}
.card-poster-placeholder{
  font-size:28px;font-weight:900;
  color:var(--accent);opacity:.5;
}
.card-play{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:var(--trans);
  background:rgba(0,0,0,.5);
}
.card:hover .card-play,.card:focus .card-play{opacity:1;}
.card-play svg{width:36px;height:36px;fill:white;}
.card-info{
  padding:8px 10px 10px;
  background:linear-gradient(to top,rgba(0,0,0,.85) 0%,rgba(0,0,0,.1) 100%);
  position:absolute;bottom:0;left:0;right:0;
}
.card-name{
  font-size:12px;font-weight:800;
  line-height:1.25;
  color:#fff;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
  overflow:hidden;
}
.card-sub{
  font-size:10px;font-weight:700;color:rgba(255,255,255,.55);
  margin-top:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.card-badge{
  position:absolute;top:8px;left:8px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;font-size:9px;font-weight:900;
  padding:2px 7px;border-radius:6px;
  letter-spacing:.3px;text-transform:uppercase;
}

/* SERIES card (wide) */
.card.series-card{
  aspect-ratio:unset;
  height:80px;
  flex-direction:row;
  border-radius:12px;
}
.card.series-card .card-poster{
  width:70px;min-width:70px;height:100%;border-radius:10px 0 0 10px;
  flex:unset;
}
.card.series-card .card-poster img{object-position:center top;}
.card.series-card .card-info{
  position:static;background:transparent;
  flex:1;padding:10px 12px;
  display:flex;flex-direction:column;justify-content:center;gap:2px;
}
.card.series-card .card-name{color:var(--text);font-size:13px;}
.card.series-card .card-sub{color:var(--muted);font-size:11px;}
.card.series-card .card-play{border-radius:0 12px 12px 0;}

/* Category card */
.card.category-card{
  aspect-ratio:16/9;
  height:120px;
}
.card.category-card .card-name{
  font-size:14px;
}
.card-category-badge{
  position:absolute;
  top:8px;
  right:8px;
  background:rgba(0,200,232,.2);
  border:1px solid rgba(0,200,232,.4);
  color:var(--accent);
  font-size:10px;
  padding:2px 8px;
  border-radius:10px;
  font-weight:800;
}

/* Empty */
.empty-state{
  padding:60px 20px;text-align:center;color:var(--muted);
  font-size:15px;font-weight:700;
}
.empty-state svg{width:48px;height:48px;opacity:.3;margin-bottom:12px;display:block;margin-inline:auto;}

/* Toast */
.toast{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  background:rgba(10,20,35,.95);color:var(--text);
  padding:10px 18px;border-radius:12px;
  border:1px solid var(--border);
  font-size:12px;font-weight:700;
  opacity:0;pointer-events:none;transition:.2s;z-index:100;
  backdrop-filter:blur(8px);
}
.toast.show{opacity:1;}

/* Scrollbar */
.main::-webkit-scrollbar{width:4px;}
.main::-webkit-scrollbar-track{background:transparent;}
.main::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:4px;}

/* Focus ring for remote nav */
.card:focus{
  outline: 3px solid var(--accent);
  outline-offset: 2px;
  transform: scale(1.04) translateY(-2px);
  z-index: 10;
  box-shadow: 0 0 0 4px rgba(0,200,232,.25), 0 8px 24px rgba(0,200,232,.18);
}

/* Mobile */
@media(max-width:600px){
  :root{--sideW:56px;}
  .side-btn{width:40px;height:40px;font-size:0;}
  .search{width:140px;}
  .search:focus{width:160px;}
  .grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;}
  .section-header,.chips-wrap,.grid{padding-left:12px;padding-right:12px;}
}
</style>
</head>
<body>

<header class="topbar">
  <div class="logo-dot">TV</div>

  <div class="breadcrumb" id="breadcrumb"></div>
  <div class="search-wrap">
    <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="6.5" cy="6.5" r="5.5"/><path d="m11 11 3 3"/></svg>

<main class="main" id="main">

</main>

<div id="toast" class="toast"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script>
/* ================= CONFIG ================= */
const FC = {
  apiKey:"AIzaSyBKSdaRAQTN-Gen0k4WerLu1GvBLKzjZlQ",
  authDomain:"aweme-46b1e.firebaseapp.com",
  projectId:"aweme-46b1e",
  storageBucket:"aweme-46b1e.firebasestorage.app",
  messagingSenderId:"762479825387",
  appId:"1:762479825387:web:8ffb3a629c0eb9f52fc9ae"
};

const M3U_URL = "https://jonatan1000-4.github.io/mi_app_rv22/canales.m3u";
const ALLOWLIST = "allowlist";

/* ================= STATE ================= */
let ALL = [];
let CAT = "tv en vivo";
let SUB = "";

// Series state
let SERIES_IDX = null;
let SERIES_KEYS = [];
let SERIES_VIEW = "LIST"; // LIST | SEASONS | EPISODES
let SELECTED_SERIE = null;
let SELECTED_SEASON = null;

// Navigation state
let FOCUS_I = 0;
let CURRENT_LIST = []; // always the currently displayed list

/* ================= UTILS ================= */
const $ = id => document.getElementById(id);
const esc = s => String(s||"").replace(/[&<>"']/g,c=>({ "&":"&amp;","<​":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;" }[c]));
const norm = s => (String(s||"").normalize?.("NFD").replace(/[\u0300-\u036f]/g,"")||String(s||"")).toLowerCase().trim();
const pad2 = n => String(parseInt(n||0,10)).padStart(2,"0");

let searchTimer = null;
const debounce = (fn, ms=300) => (...args) => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => fn(...args), ms);
};

function toast(t){
  const el = $("toast");
  if(!el) return;
  el.textContent = t;
  el.classList.add("show");
  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(() => el.classList.remove("show"), 1800);
}

/* ================= THEME ================= */
function applyTheme(m){
  document.body.classList.toggle("light", m === "light");
  $("btnTheme").textContent = m === "light" ? "🌙" : "☀️";
  localStorage.setItem("theme", m);
}
applyTheme(localStorage.getItem("theme") || "dark");

$("btnTheme").onclick = () => {
  const isLight = document.body.classList.contains("light");
  applyTheme(isLight ? "dark" : "light");
};

/* ================= BREADCRUMB ================= */
function updateBreadcrumb(){
  const bc = $("breadcrumb");
  if(!bc) return;

  const catLabels = {
    "tv en vivo": "TV en Vivo",
    "peliculas": "Películas",
    "series": "Series",
    "radios": "Radios"
  };

  const parts = [];

  // Root category
  parts.push({ label: catLabels[CAT] || CAT, action: () => setCategory(CAT) });

  if(CAT === "series"){
    if(SERIES_VIEW === "SEASONS" && SELECTED_SERIE){
      const title = SERIES_IDX[SELECTED_SERIE]?.title || SELECTED_SERIE;
      parts.push({ label: title, action: () => {
        SERIES_VIEW = "SEASONS";
        SELECTED_SEASON = null;
        FOCUS_I = 0;
        renderView();
      }});
    }
    if(SERIES_VIEW === "EPISODES" && SELECTED_SERIE){
      const title = SERIES_IDX[SELECTED_SERIE]?.title || SELECTED_SERIE;
      parts.push({ label: title, action: () => {
        SERIES_VIEW = "SEASONS";
        SELECTED_SEASON = null;
        FOCUS_I = 0;
        renderView();
      }});
      parts.push({ label: "Temporada " + parseInt(SELECTED_SEASON), action: null });
    }
  } else if(SUB){
    parts.push({ label: SUB, action: null });
  }

  bc.innerHTML = parts.map((p, i) => {
    const isLast = i === parts.length - 1;
    const sep = i > 0 ? `<span class="sep">›</span>` : "";
    return `${sep}<span class="bc-item${isLast ? " last" : ""}" data-i="${i}">${esc(p.label)}</span>`;
  }).join("");

  // Bind clicks
  bc.querySelectorAll(".bc-item:not(.last)").forEach(el => {
    const idx = parseInt(el.dataset.i);
    if(parts[idx]?.action){
      el.onclick = parts[idx].action;
    }
  });
}

/* ================= CATEGORY PARSE ================= */
function parseCatAndSub(group, name=""){
  const g = String(group||"").toLowerCase();
  const full = (g + " " + name).toLowerCase();

  let catKey = "tv en vivo";

  if(g.includes("pelicula") || g.includes("movie") || g.includes("film")){
    catKey = "peliculas";
  } else if(g.includes("serie") && !g.includes("tv en vivo")){
    catKey = "series";
  } else if(g.includes("radio") || g.includes("fm") || g.includes("am")){
    catKey = "radios";
  } else {
    const isTrueSeries =
      /\bS\d{1,2}\s?E\d{1,2}\b/i.test(full) ||
      /\bS\d{1,2}E\d{1,2}\b/i.test(full) ||
      /\b\d+x\d+\b/i.test(full) ||
      full.includes("temporada") ||
      full.includes("episodio");

    if(isTrueSeries){
      catKey = "series";
    } else if(full.includes("pelicula") || full.includes("movie") || full.includes("film")){
      catKey = "peliculas";
    }
  }

  let sub = g.includes(" - ")
    ? g.split(" - ").slice(1).join(" - ").trim()
    : g.trim();

  return { catKey, sub: sub || "General" };
}

/* ================= M3U ================= */
function parseM3U(text){
  text = (text||"").replace(/^\uFEFF/, "");
  const lines = text.split(/\r?\n/);
  const out = [];
  let meta = {};

  for(const l of lines){
    const line = l.trim();
    if(!line) continue;

    if(line.startsWith("#EXTINF")){
      meta = {
        name: line.split(",").slice(1).join(",").trim() || "Canal",
        logo:"", group:"", id:"", chno:""
      };
      const re = /([\w-]+)\s*=\s*"([^"]*)"/g;
      let m;
      while((m = re.exec(line))){
        if(m[1]==="tvg-logo") meta.logo = m[2];
        if(m[1]==="group-title") meta.group = m[2];
        if(m[1]==="tvg-id") meta.id = m[2];
        if(m[1]==="tvg-chno") meta.chno = m[2];
      }
    } else if(!line.startsWith("#")){
      const url = line.split(",")[0].trim();
      const cs = parseCatAndSub(meta.group, meta.name);
      out.push({
        id: meta.id || meta.name,
        name: meta.name,
        logo: meta.logo,
        group: meta.group,
        catKey: cs.catKey,
        sub: cs.sub,
        number: meta.chno,
        url,
        sMeta: cs.catKey === "series" ? parseSeriesMeta(meta.name) : null
      });
      meta = {};
    }
  }
  return out;
}

/* ================= SERIES HELPERS ================= */
function cleanTitle(t){
  return String(t||"")
    .replace(/[_\-|]+/g," ")
    .replace(/\s+/g," ")
    .replace(/\b(1080p|720p|480p|4k|uhd|hdr|latino|castellano|sub|espanol)\b/ig,"")
    .trim();
}

function parseSeriesMeta(raw){
  const s = cleanTitle(raw);
  let m = s.match(/^(.*?)[\s\-:]*[sS](\d+)[\s\-:]*[eE](\d+)/);
  if(m) return { title: cleanTitle(m[1]), season: parseInt(m[2],10), episode: parseInt(m[3],10) };
  m = s.match(/^(.*?)(\d+)\s*x\s*(\d+)/);
  if(m) return { title: cleanTitle(m[1]), season: parseInt(m[2],10), episode: parseInt(m[3],10) };
  return { title: cleanTitle(s), season: 0, episode: 0 };
}

function getSeriesKey(title){
  return cleanTitle(title)
    .toLowerCase()
    .replace(/\b(s\d{1,2}e\d{1,2}|season\s*\d+|\d+x\d+)\b/gi, "")
    .replace(/\s+/g," ")
    .trim();
}

function buildSeriesIdx(items){
  const idx = {};
  for(const it of items){
    const meta = parseSeriesMeta(it.name);
    const baseTitle = getSeriesKey(meta.title);
    const key = norm(baseTitle);
    if(!idx[key]){
      idx[key] = { title: baseTitle, logo: it.logo, seasons: {} };
    }
    const seasonKey = pad2(meta.season || 1);
    if(!idx[key].seasons[seasonKey]) idx[key].seasons[seasonKey] = [];
    idx[key].seasons[seasonKey].push({ ...it, episode: meta.episode, season: meta.season });
  }
  return idx;
}

/* ================= SUBCATEGORY CARDS ================= */
function getSubCategoryCards(cat){
  const map = {};
  ALL.filter(c => c.catKey === cat).forEach(c => {
    const key = c.sub || "General";
    if(!map[key]) map[key] = { name: key, count: 0, logo: "" };
    map[key].count++;
    if(!map[key].logo && c.logo) map[key].logo = c.logo;
  });
  return Object.values(map).sort((a,b) => b.count - a.count);
}

/* ================= FIREBASE ================= */
firebase.initializeApp(FC);
const auth = firebase.auth();
const db = firebase.firestore();

function tsMs(x){
  if(!x) return 0;
  try{ if(x.toDate) return x.toDate().getTime(); }catch(e){}
  if(x instanceof Date) return x.getTime();
  return typeof x === "number" ? x : 0;
}

auth.onAuthStateChanged(async user => {
  if(!user){ location.href = "login.html"; return; }

  const snap = await db.collection(ALLOWLIST).doc(user.uid).get();
  const d = snap.exists ? snap.data() : {};

  if(d.enabled !== true){
    auth.signOut();
    location.href = "login.html";
    return;
  }

  const exp = tsMs(d.expiresAt) || (tsMs(d.startAt) + 30*86400000);
  const days = Math.max(0, Math.ceil((exp - Date.now()) / 86400000));

  const emailEl = $("sideEmail");
  const daysEl = $("sideDays");
  if(emailEl) emailEl.textContent = (d.email || user.email || "").split("@")[0];
  if(daysEl) daysEl.textContent = days + "d";

  boot();
});

/* ================= CATEGORY SWITCH ================= */
function setCategory(cat){
  CAT = String(cat).toLowerCase();
  SUB = "";
  FOCUS_I = 0;
  SERIES_IDX = null;
  SERIES_KEYS = [];
  SERIES_VIEW = "LIST";
  SELECTED_SERIE = null;
  SELECTED_SEASON = null;

  if(CAT === "series"){
    const si = ALL.filter(x => x.catKey === "series");
    SERIES_IDX = buildSeriesIdx(si);
    SERIES_KEYS = Object.keys(SERIES_IDX);
  }

  document.querySelectorAll(".side-btn").forEach(b => {
    b.classList.toggle("active", b.dataset.cat === CAT);
  });

  // Clear search when switching category
  if($("search")) $("search").value = "";

  renderView();
}

/* ================= SEARCH ================= */
$("search").addEventListener("input", debounce(() => {
  FOCUS_I = 0;
  // If we're in channel view (SUB set), re-render channels with filter
  if(CAT !== "series" && SUB){
    renderChannels();
  } else if(CAT === "series" && SERIES_VIEW === "EPISODES"){
    renderEpisodes();
  } else {
    // In category/series list view, filter those
    renderView();
  }
}, 250));

/* ================= MAIN RENDER ================= */
function renderView(){
  const main = $("main");
  if(main) main.scrollTop = 0;

  updateBreadcrumb();

  if(CAT === "series"){
    if(!SERIES_IDX || !SERIES_KEYS.length){
      renderEmpty("Sin series disponibles");
      return;
    }
    if(SERIES_VIEW === "LIST")    { renderSeriesList(); return; }
    if(SERIES_VIEW === "SEASONS") { renderSeasons();    return; }
    if(SERIES_VIEW === "EPISODES"){ renderEpisodes();   return; }
    return;
  }

  // Normal: TV / Peliculas / Radios
  if(SUB){
    renderChannels();
  } else {
    renderCategoryGrid();
  }
}

/* ================= CATEGORY GRID ================= */
function renderCategoryGrid(){
  const q = norm($("search")?.value || "");
  let categories = getSubCategoryCards(CAT);

  if(q) categories = categories.filter(c => norm(c.name).includes(q));

  updateSectionHeader(
    CAT === "tv en vivo" ? "TV en Vivo" :
    CAT === "peliculas"  ? "Películas"  :
    CAT === "radios"     ? "Radios"     : CAT,
    categories.length + " categorías"
  );
  hideChips();

  if(!categories.length){
    renderEmpty("Sin categorías");
    return;
  }

  CURRENT_LIST = categories;

  const grid = $("grid");
  grid.innerHTML = categories.map((c, i) => `
    <div class="card category-card" data-idx="${i}" tabindex="0">
      <div class="card-poster">
        ${c.logo
          ? `<img src="${esc(c.logo)}" loading="lazy" onerror="this.style.display='none'">`
          : `<div class="card-poster-placeholder">${esc((c.name||"?")[0].toUpperCase())}</div>`
        }
        <div class="card-play">
          <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </div>
      </div>
      <div class="card-info">
        <div class="card-name">${esc(c.name)}</div>
        <div class="card-sub">${c.count} canales</div>
      </div>
      <div class="card-category-badge">CAT</div>
    </div>
  `).join("");

  bindCardClicks(grid, (idx) => {
    SUB = categories[idx].name;
    FOCUS_I = 0;
    renderView();
  });

  setTimeout(() => focusCard(0), 50);
}

/* ================= CHANNEL GRID ================= */
function renderChannels(){
  const q = norm($("search")?.value || "");
  let items = ALL.filter(c => c.catKey === CAT && (c.sub || "General") === SUB);

  if(q) items = items.filter(c => norm(c.name).includes(q));

  updateSectionHeader(SUB, items.length + " canales");
  hideChips();
  updateBreadcrumb();

  if(!items.length){
    renderEmpty("Sin canales" + (q ? ` para "${$("search").value}"` : ""));
    return;
  }

  CURRENT_LIST = items;

  const grid = $("grid");
  grid.innerHTML = items.map((c, i) => `
    <div class="card" data-idx="${i}" tabindex="0">
      <div class="card-poster">
        ${c.logo
          ? `<img src="${esc(c.logo)}" loading="lazy" onerror="this.style.display='none'">`
          : `<div class="card-poster-placeholder">${esc((c.name||"?")[0].toUpperCase())}</div>`
        }
        <div class="card-play">
          <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </div>
      </div>
      <div class="card-info">
        <div class="card-name">${esc(c.name)}</div>
        ${c.number ? `<div class="card-sub">Canal ${esc(c.number)}</div>` : ""}
      </div>
    </div>
  `).join("");

  bindCardClicks(grid, (idx) => {
    playChannel(CURRENT_LIST[idx], CURRENT_LIST);
  });

  setTimeout(() => focusCard(FOCUS_I), 50);
}

/* ================= SERIES LIST ================= */
function renderSeriesList(){
  const q = norm($("search")?.value || "");
  let list = SERIES_KEYS.map(k => ({
    key: k,
    title: SERIES_IDX[k].title,
    logo: SERIES_IDX[k].logo,
    seasonsCount: Object.keys(SERIES_IDX[k].seasons).length
  }));

  if(q) list = list.filter(s => norm(s.title).includes(q));

  updateSectionHeader("Series", list.length + " series");
  hideChips();

  if(!list.length){
    renderEmpty("Sin series" + (q ? ` para "${$("search").value}"` : ""));
    return;
  }

  CURRENT_LIST = list;

  const grid = $("grid");
  grid.innerHTML = list.map((s, i) => `
    <div class="card category-card" data-idx="${i}" tabindex="0">
      <div class="card-poster">
        ${s.logo
          ? `<img src="${esc(s.logo)}" loading="lazy" onerror="this.style.display='none'">`
          : `<div class="card-poster-placeholder">🎬</div>`
        }
        <div class="card-play">
          <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </div>
      </div>
      <div class="card-info">
        <div class="card-name">${esc(s.title)}</div>
        <div class="card-sub">${s.seasonsCount} temporada${s.seasonsCount !== 1 ? "s" : ""}</div>
      </div>
    </div>
  `).join("");

  bindCardClicks(grid, (idx) => {
    SELECTED_SERIE = list[idx].key;
    SERIES_VIEW = "SEASONS";
    FOCUS_I = 0;
    renderView();
  });

  setTimeout(() => focusCard(0), 50);
}

/* ================= SEASONS ================= */
function renderSeasons(){
  const serie = SERIES_IDX[SELECTED_SERIE];
  if(!serie){ SERIES_VIEW = "LIST"; renderView(); return; }

  const seasons = Object.keys(serie.seasons).sort();

  updateSectionHeader(serie.title, seasons.length + " temporadas");
  hideChips();

  CURRENT_LIST = seasons;

  const grid = $("grid");
  grid.innerHTML = seasons.map((s, i) => `
    <div class="card category-card" data-idx="${i}" tabindex="0">
      <div class="card-poster">
        ${serie.logo
          ? `<img src="${esc(serie.logo)}" loading="lazy" onerror="this.style.display='none'">`
          : `<div class="card-poster-placeholder">📁</div>`
        }
        <div class="card-play">
          <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </div>
      </div>
      <div class="card-info">
        <div class="card-name">Temporada ${parseInt(s)}</div>
        <div class="card-sub">${serie.seasons[s].length} episodios</div>
      </div>
    </div>
  `).join("");

  bindCardClicks(grid, (idx) => {
    SELECTED_SEASON = seasons[idx];
    SERIES_VIEW = "EPISODES";
    FOCUS_I = 0;
    renderView();
  });

  setTimeout(() => focusCard(0), 50);
}

/* ================= EPISODES ================= */
function renderEpisodes(){
  const serie = SERIES_IDX[SELECTED_SERIE];
  if(!serie){ SERIES_VIEW = "LIST"; renderView(); return; }

  const q = norm($("search")?.value || "");
  let eps = (serie.seasons[SELECTED_SEASON] || [])
    .slice()
    .sort((a, b) => a.episode - b.episode);

  if(q) eps = eps.filter(e => norm(e.name).includes(q));

  updateSectionHeader(
    serie.title + " — Temporada " + parseInt(SELECTED_SEASON),
    eps.length + " episodios"
  );
  hideChips();

  if(!eps.length){
    renderEmpty("Sin episodios");
    return;
  }

  CURRENT_LIST = eps;

  const grid = $("grid");
  grid.innerHTML = eps.map((e, i) => `
    <div class="card" data-idx="${i}" tabindex="0">
      <div class="card-poster">
        ${e.logo
          ? `<img src="${esc(e.logo)}" loading="lazy" onerror="this.style.display='none'">`
          : `<div class="card-poster-placeholder">▶</div>`
        }
        <div class="card-play">
          <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </div>
      </div>
      <div class="card-info">
        <div class="card-name">EP ${e.episode} — ${esc(serie.title)}</div>
        <div class="card-sub">${esc(e.name)}</div>
      </div>
    </div>
  `).join("");

  bindCardClicks(grid, (idx) => {
    playChannel(CURRENT_LIST[idx], CURRENT_LIST);
  });

  setTimeout(() => focusCard(FOCUS_I), 50);
}

/* ================= HELPERS ================= */
function updateSectionHeader(title, meta){
  const sh = $("sectionHeader");
  if(!sh) return;
  sh.style.display = "flex";
  sh.innerHTML = `
    <div>
      <div class="section-title"><span>${esc(title)}</span></div>
      <div class="section-meta">${esc(meta)}</div>
    </div>
  `;
}

function hideChips(){
  const cw = $("chipsWrap");
  if(cw){ cw.style.display = "none"; cw.innerHTML = ""; }
}

function renderEmpty(msg){
  const grid = $("grid");
  if(grid) grid.innerHTML = `<div class="empty-state">${esc(msg)}</div>`;
}

/**
 * Bind click events to all .card elements in a container.
 * Uses data-idx to get the correct index — fixes the "always plays first channel" bug.
 */
function bindCardClicks(container, onSelect){
  container.querySelectorAll(".card").forEach(el => {
    el.addEventListener("click", () => {
      const idx = parseInt(el.dataset.idx, 10);
      if(!isNaN(idx)) onSelect(idx);
    });
  });
}

/* ================= PLAY ================= */
function playChannel(sel, list){
  if(!sel || !sel.url) return;

  const safeList = list || CURRENT_LIST || [];

  const payload = {
    url: sel.url,
    channels: safeList.map(c => ({ name: c.name, url: c.url })),
    selectedName: sel.name
  };

  if(window.AndroidBridge?.playChannel){
    AndroidBridge.playChannel(JSON.stringify(payload));
  } else {
    console.log("▶ Play:", payload);
    toast("▶ " + sel.name);
  }
}

/* ================= FOCUS / KEYBOARD ================= */
function focusCard(i){
  const cards = [...document.querySelectorAll(".card")];
  if(!cards.length) return;
  i = Math.max(0, Math.min(cards.length - 1, i));
  FOCUS_I = i;
  const el = cards[i];
  if(el){
    el.focus({ preventScroll: false });
    el.scrollIntoView({ block: "nearest", behavior: "smooth" });
  }
}

function getColumns(){
  const grid = $("grid");
  if(!grid) return 1;
  const style = window.getComputedStyle(grid);
  const cols = style.gridTemplateColumns.split(" ").length;
  return Math.max(1, cols);
}

document.addEventListener("keydown", function(e){
  // If search is focused, don't intercept arrows
  if(document.activeElement === $("search")) return;

  const cards = [...document.querySelectorAll(".card")];
  if(!cards.length) return;

  const cols = getColumns();
  let nx = FOCUS_I;

  switch(e.key){
    case "ArrowRight": nx = FOCUS_I + 1; break;
    case "ArrowLeft":  nx = FOCUS_I - 1; break;
    case "ArrowDown":  nx = FOCUS_I + cols; break;
    case "ArrowUp":    nx = FOCUS_I - cols; break;

    case "Enter":
      e.preventDefault();
      cards[FOCUS_I]?.click();
      return;

    case "Backspace":
    case "Back":
    case "GoBack":
      e.preventDefault();
      goBack();
      return;

    default: return;
  }

  nx = Math.max(0, Math.min(cards.length - 1, nx));
  if(nx !== FOCUS_I){
    e.preventDefault();
    focusCard(nx);
  }
});

/* ================= BACK NAVIGATION ================= */
function goBack(){
  if(CAT === "series"){
    if(SERIES_VIEW === "EPISODES"){
      SERIES_VIEW = "SEASONS";
      SELECTED_SEASON = null;
      FOCUS_I = 0;
      renderView();
    } else if(SERIES_VIEW === "SEASONS"){
      SERIES_VIEW = "LIST";
      SELECTED_SERIE = null;
      FOCUS_I = 0;
      renderView();
    }
  } else if(SUB){
    SUB = "";
    FOCUS_I = 0;
    renderView();
  }
}

/* ================= SIDEBAR BUTTONS ================= */
document.querySelectorAll(".side-btn").forEach(btn => {
  btn.onclick = () => setCategory(btn.dataset.cat);
});

/* ================= BOOT ================= */
async function boot(){
  try{
    toast("Cargando...");
    const res = await fetch(M3U_URL, { cache: "no-store" });
    const data = await res.text();
    ALL = parseM3U(data);

    if(!ALL.length){
      toast("Sin canales");
      renderEmpty("No se encontraron canales");
      return;
    }

    setCategory("tv en vivo");
    toast("Listo ✓");
  } catch(err){
    console.error(err);
    toast("Error cargando M3U");
    renderEmpty("Error al cargar canales. Verifica tu conexión.");
  }
}
</script>
