<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>TV | Canales</title>
<style>
:root{
  --bg:#080f1a;
  --surface:#0d1929;
  --card:#0f1e30;
  --card-hover:#152540;
  --border:rgba(255,255,255,.08);
  --border-hover:rgba(255,255,255,.18);
  --text:#e8f4ff;
  --muted:rgba(232,244,255,.55);
  --accent:#00c8e8;
  --accent2:#7c5cbf;
  --topH:60px;
  --sideW:72px;
  --radius:14px;
  --trans:.18s ease;
}
body.light{
  --bg:#f0f4fa;
  --surface:#ffffff;
  --card:#ffffff;
  --card-hover:#f0f6ff;
  --border:rgba(0,0,0,.08);
  --border-hover:rgba(0,100,200,.25);
  --text:#0d1726;
  --muted:rgba(13,23,38,.55);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
  background:var(--bg);
  color:var(--text);
}

/* TOPBAR */
.topbar{
  position:fixed;top:0;left:0;right:0;
  height:var(--topH);
  display:flex;align-items:center;gap:10px;
  padding:0 16px;
  background:rgba(8,15,26,.92);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  z-index:50;
}
body.light .topbar{ background:rgba(255,255,255,.92); }

.logo-dot{
  width:32px;height:32px;border-radius:10px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;
  font-weight:900;font-size:13px;color:#fff;flex-shrink:0;
}
.app-title{
  font-weight:800;font-size:15px;letter-spacing:-.2px;
  flex-shrink:0;
}
.breadcrumb{
  display:flex;align-items:center;gap:6px;
  font-size:13px;color:var(--muted);
  overflow:hidden;
}
.breadcrumb .sep{opacity:.4}
.breadcrumb .bc-item{
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  max-width:160px;
  cursor:pointer;
}
.breadcrumb .bc-item.last{color:var(--text);font-weight:700;}
.breadcrumb .bc-item:not(.last):hover{color:var(--accent);}

.search-wrap{margin-left:auto;position:relative;}
.search-wrap svg{
  position:absolute;left:10px;top:50%;transform:translateY(-50%);
  opacity:.45;pointer-events:none;
}
.search{
  padding:8px 10px 8px 32px;
  border-radius:10px;border:1px solid var(--border);
  background:rgba(255,255,255,.06);
  color:var(--text);font-size:13px;font-weight:600;
  outline:none;width:220px;transition:var(--trans);
}
body.light .search{background:rgba(0,0,0,.05);}
.search:focus{border-color:rgba(0,200,232,.5);width:260px;background:rgba(0,200,232,.05);}
.search::placeholder{color:var(--muted);}

.btn-theme{
  width:36px;height:36px;border-radius:10px;
  border:1px solid var(--border);background:transparent;
  color:var(--text);cursor:pointer;font-size:16px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:var(--trans);
}
.btn-theme:hover{background:rgba(255,255,255,.08);}

/* ICON SIDEBAR */
.sidebar{
  position:fixed;top:var(--topH);left:0;bottom:0;
  width:var(--sideW);
  display:flex;flex-direction:column;align-items:center;
  padding:14px 0;gap:8px;
  background:rgba(8,15,26,.7);
  backdrop-filter:blur(8px);
  border-right:1px solid var(--border);
  z-index:40;overflow:hidden;
}
body.light .sidebar{background:rgba(255,255,255,.85);}

.side-btn{
  width:48px;height:48px;border-radius:14px;
  border:1px solid transparent;background:transparent;
  color:var(--muted);cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;font-size:9px;font-weight:800;letter-spacing:.3px;text-transform:uppercase;
  transition:var(--trans);outline:none;
}
.side-btn svg{width:20px;height:20px;opacity:.7;transition:var(--trans);}
.side-btn:hover,.side-btn:focus{
  background:rgba(0,200,232,.1);
  border-color:rgba(0,200,232,.3);
  color:var(--accent);
}
.side-btn:hover svg,.side-btn:focus svg{opacity:1;}
.side-btn.active{
  background:linear-gradient(135deg,rgba(0,200,232,.18),rgba(124,92,191,.18));
  border-color:rgba(0,200,232,.5);
  color:var(--accent);
}
.side-btn.active svg{opacity:1;}

.side-footer{
  margin-top:auto;padding-top:14px;border-top:1px solid var(--border);
  width:100%;display:flex;flex-direction:column;align-items:center;gap:6px;
  font-size:9px;font-weight:800;color:var(--muted);
}
.side-footer .sub-dot{
  width:8px;height:8px;border-radius:50%;background:#22c55e;
  box-shadow:0 0 0 3px rgba(34,197,94,.2);
}
.side-footer .sub-dot.warn{background:#f59e0b;box-shadow:0 0 0 3px rgba(245,158,11,.2);}
.side-footer .sub-dot.danger{background:#ef4444;box-shadow:0 0 0 3px rgba(239,68,68,.2);}

/* MAIN */
.main{
  position:fixed;
  top:var(--topH);left:var(--sideW);right:0;bottom:0;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}

/* SECTION HEADER */
.section-header{
  padding:20px 20px 10px;
  display:flex;align-items:center;justify-content:space-between;
  gap:12px;flex-wrap:wrap;
}
.section-title{
  font-size:22px;font-weight:800;letter-spacing:-.4px;
}
.section-title span{
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
.section-meta{font-size:13px;color:var(--muted);font-weight:600;}

/* SUBCATEGORY CHIPS */
.chips-wrap{
  padding:0 20px 16px;
  display:flex;gap:8px;flex-wrap:wrap;
}
.chip{
  padding:6px 14px;border-radius:20px;
  border:1px solid var(--border);
  background:rgba(255,255,255,.05);
  color:var(--muted);font-size:12px;font-weight:700;
  cursor:pointer;transition:var(--trans);white-space:nowrap;
  outline:none;
}
body.light .chip{background:rgba(0,0,0,.05);}
.chip:hover,.chip:focus{
  background:rgba(0,200,232,.1);
  border-color:rgba(0,200,232,.4);
  color:var(--accent);
}
.chip.active{
  background:linear-gradient(135deg,rgba(0,200,232,.2),rgba(124,92,191,.15));
  border-color:var(--accent);
  color:var(--accent);
  box-shadow:0 0 0 2px rgba(0,200,232,.15);
}
.chip-count{
  display:inline-block;
  background:rgba(0,200,232,.2);color:var(--accent);
  font-size:10px;font-weight:800;
  padding:1px 6px;border-radius:9px;
  margin-left:4px;
}

/* GRID */
.grid{
  padding:0 20px 20px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:12px;
}
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  cursor:pointer;outline:none;
  position:relative;overflow:hidden;
  transition:var(--trans);
  aspect-ratio:2/3;
  display:flex;flex-direction:column;
}
.card:hover,.card:focus{
  border-color:rgba(0,200,232,.5);
  background:var(--card-hover);
  transform:translateY(-2px);
  box-shadow:0 8px 24px rgba(0,200,232,.12);
}
.card.active-focus{
  border-color:var(--accent);
  box-shadow:0 0 0 2px rgba(0,200,232,.25);
}
.card-poster{
  flex:1;overflow:hidden;
  background:rgba(255,255,255,.04);
  position:relative;
  display:flex;align-items:center;justify-content:center;
}
.card-poster img{
  width:100%;height:100%;object-fit:cover;
  display:block;transition:var(--trans);
}
.card:hover .card-poster img,.card:focus .card-poster img{transform:scale(1.04);}
.card-poster-placeholder{
  font-size:28px;font-weight:900;
  color:var(--accent);opacity:.5;
}
.card-play{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:var(--trans);
  background:rgba(0,0,0,.5);
}
.card:hover .card-play,.card:focus .card-play{opacity:1;}
.card-play svg{width:36px;height:36px;fill:white;drop-shadow:0 2px 6px rgba(0,0,0,.6);}
.card-info{
  padding:8px 10px 10px;
  background:linear-gradient(to top,rgba(0,0,0,.85) 0%,rgba(0,0,0,.1) 100%);
  position:absolute;bottom:0;left:0;right:0;
}
.card-name{
  font-size:12px;font-weight:800;
  line-height:1.25;
  color:#fff;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
  overflow:hidden;
}
.card-sub{
  font-size:10px;font-weight:700;color:rgba(255,255,255,.55);
  margin-top:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.card-badge{
  position:absolute;top:8px;left:8px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;font-size:9px;font-weight:900;
  padding:2px 7px;border-radius:6px;
  letter-spacing:.3px;text-transform:uppercase;
}
.card-badge.season{ background:rgba(124,92,191,.85); }
.card-badge.episode{ background:rgba(0,200,232,.25);color:var(--accent);border:1px solid rgba(0,200,232,.4); }

/* SERIES card (wide) */
.card.series-card{
  aspect-ratio:unset;
  height:80px;
  flex-direction:row;
  border-radius:12px;
}
.card.series-card .card-poster{
  width:70px;min-width:70px;height:100%;border-radius:10px 0 0 10px;
  flex:unset;
}
.card.series-card .card-poster img{object-position:center top;}
.card.series-card .card-info{
  position:static;background:transparent;
  flex:1;padding:10px 12px;
  display:flex;flex-direction:column;justify-content:center;gap:2px;
}
.card.series-card .card-name{color:var(--text);font-size:13px;}
.card.series-card .card-sub{color:var(--muted);font-size:11px;}
.card.series-card .card-play{border-radius:0 12px 12px 0;}

/* Empty */
.empty-state{
  padding:60px 20px;text-align:center;color:var(--muted);
  font-size:15px;font-weight:700;
}
.empty-state svg{width:48px;height:48px;opacity:.3;margin-bottom:12px;display:block;margin-inline:auto;}

/* Toast */
.toast{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  background:rgba(10,20,35,.95);color:var(--text);
  padding:10px 18px;border-radius:12px;
  border:1px solid var(--border);
  font-size:12px;font-weight:700;
  opacity:0;pointer-events:none;transition:.2s;z-index:100;
  backdrop-filter:blur(8px);
}
.toast.show{opacity:1;}

/* Scrollbar */
.main::-webkit-scrollbar{width:4px;}
.main::-webkit-scrollbar-track{background:transparent;}
.main::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:4px;}

/* Mobile */
@media(max-width:600px){
  :root{--sideW:56px;}
  .side-btn{width:40px;height:40px;font-size:0;}
  .search{width:140px;}
  .search:focus{width:160px;}
  .grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;}
  .section-header,.chips-wrap,.grid{padding-left:12px;padding-right:12px;}
}
</style>
</head>
<body>

<header class="topbar">
  <div class="logo-dot">TV</div>
  <div class="app-title">StreamTV</div>
  <div class="breadcrumb" id="breadcrumb"></div>
  <div class="search-wrap">
    <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="6.5" cy="6.5" r="5.5"/><path d="m11 11 3 3"/></svg>
    <input id="search" class="search" placeholder="Buscar..." autocomplete="off"/>
  </div>
  <button id="btnTheme" class="btn-theme" title="Tema">🌙</button>
</header>

<aside class="sidebar" id="sidebar">
  <button class="side-btn active" data-cat="tv en vivo" title="TV en vivo">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="4" width="20" height="14" rx="2"/><path d="M8 20h8M12 18v2"/></svg>
    TV
  </button>
  <button class="side-btn" data-cat="peliculas" title="Películas">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M7 4v16M17 4v16M2 9h5M17 9h5M2 15h5M17 15h5"/></svg>
    Films
  </button>
  <button class="side-btn" data-cat="series" title="Series">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M2 7h20M2 12h20M2 17h12"/><circle cx="19" cy="17" r="3"/></svg>
    Series
  </button>
  <button class="side-btn" data-cat="radios" title="Radios">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M6.3 6.3a8 8 0 0 0 0 11.4M17.7 6.3a8 8 0 0 1 0 11.4M3.5 3.5a13.5 13.5 0 0 0 0 17M20.5 3.5a13.5 13.5 0 0 1 0 17"/></svg>
    Radio
  </button>

  <div class="side-footer" id="sideFooter">
    <div class="sub-dot" id="subDot"></div>
    <div id="sideEmail" style="text-align:center;word-break:break-all;max-width:60px;font-size:8px;"></div>
    <div id="sideDays"></div>
  </div>
</aside>

<main class="main" id="main">
  <div class="section-header" id="sectionHeader" style="display:none"></div>
  <div class="chips-wrap" id="chipsWrap" style="display:none"></div>
  <div class="grid" id="grid"></div>
</main>

<div id="toast" class="toast"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script>
/* CONFIG */
var FC = {
  apiKey:"AIzaSyBKSdaRAQTN-Gen0k4WerLu1GvBLKzjZlQ",
  authDomain:"aweme-46b1e.firebaseapp.com",
  projectId:"aweme-46b1e",
  storageBucket:"aweme-46b1e.firebasestorage.app",
  messagingSenderId:"762479825387",
  appId:"1:762479825387:web:8ffb3a629c0eb9f52fc9ae"
};
var M3U_URL = "https://jonatan1000-4.github.io/mi_app_rv22/canales.m3u";
var ALLOWLIST = "allowlist";

/* STATE */
var ALL = [];
var CAT = "tv en vivo";
var SUB = ""; // subcategory filter
var SERIES_MODE = "SERIES";
var SERIES_IDX = null;
var SERIES_KEYS = [];
var ACTIVE_SERIE = "";
var ACTIVE_SEASON = "";
var FOCUS_I = 0;

/* UTILS */
function $(id){ return document.getElementById(id); }
function esc(s){ return String(s||"").replace(/[&<>"']/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c];}); }
function norm(s){ s=String(s||""); try{s=s.normalize("NFD").replace(/[\u0300-\u036f]/g,"");}catch(e){} return s.trim().toLowerCase(); }
function pad2(n){ n=parseInt(n,10)||0; return(n<10?"0":"")+n; }
function toast(t){ var el=$("toast"); el.textContent=t; el.classList.add("show"); clearTimeout(window._tt); window._tt=setTimeout(function(){el.classList.remove("show");},1500); }

/* Group-title → section (cat) y subcategory */
function parseCatAndSub(group){
  var g = String(group||"");
  var catKey = "";
  var sub = "";

  var gn = norm(g);
  if(gn.indexOf("serie") >= 0) catKey = "series";
  else if(gn.indexOf("pel") >= 0) catKey = "peliculas";
  else if(gn.indexOf("radio") >= 0) catKey = "radios";
  else if(gn.indexOf("tv") >= 0 || gn.indexOf("vivo") >= 0 || gn.indexOf("canal") >= 0) catKey = "tv en vivo";
  else catKey = "tv en vivo";

  /* Sub: parte después del " - " o toda la cadena si no hay separador */
  var parts = g.split(" - ");
  if(parts.length >= 2){
    sub = parts.slice(1).join(" - ").replace(/^[\s⭐️✨🎬📺]+/, "").trim();
  } else {
    sub = g.trim();
  }
  // limpiar emojis del sub para clave de ordenado pero mantener para display
  return { catKey:catKey, sub:(sub||"General") };
}

/* M3U parser */
function parseM3U(text){
  text=(text||"").replace(/^\uFEFF/,"");
  var lines=text.split(/\r?\n/);
  var out=[];
  var name="",logo="",group="",id="",chno="";
  for(var i=0;i<lines.length;i++){
    var l=(lines[i]||"").trim();
    if(!l) continue;
    if(l.indexOf("#EXTINF")===0){
      name=l.split(",").slice(1).join(",").trim()||"Canal";
      logo="";group="";id="";chno="";
      var re=/([\w-]+)\s*=\s*"([^"]*)"/g, m;
      while((m=re.exec(l))!==null){
        var kk=m[1],vv=m[2];
        if(kk==="tvg-logo") logo=vv;
        if(kk==="group-title") group=vv;
        if(kk==="tvg-id") id=vv;
        if(kk==="tvg-chno") chno=vv;
      }
    } else if(l.charAt(0)!=="#"){
      var url=String(l).split(",")[0].trim();
      var cs=parseCatAndSub(group);
      out.push({
        id:(id||name||("ch_"+i)), name:(name||"Canal"),
        logo:(logo||""), group:(group||""), catKey:cs.catKey, sub:cs.sub,
        number:(chno||""), url:url,
        sMeta:(cs.catKey==="series")?parseSeriesMeta(name):null
      });
      name="";logo="";group="";id="";chno="";
    }
  }
  return out;
}

/* Series meta */
function cleanTitle(t){
  t=String(t||"").replace(/[_\-|]+/g," ").replace(/\s+/g," ").trim();
  t=t.replace(/\b(1080p|720p|480p|4k|uhd|hdr|latino|castellano|espanol|sub|subs)\b/ig,"").trim();
  return t.replace(/\s+/g," ").trim();
}
function parseSeriesMeta(raw){
  var s=cleanTitle(raw||"");
  var m=s.match(/^(.*?)[\s\-:]*[ST]\s*(\d{1,2})\s*[\s\-:]*E\s*(\d{1,3})\b/i);
  if(m) return{title:cleanTitle(m[1]),season:parseInt(m[2],10)||0,episode:parseInt(m[3],10)||0};
  var m2=s.match(/^(.*?)[\s\-:]*([0-9]{1,2})\s*x\s*([0-9]{1,3})\b/i);
  if(m2) return{title:cleanTitle(m2[1]),season:parseInt(m2[2],10)||0,episode:parseInt(m2[3],10)||0};
  var mT=s.match(/^(.*?)[\s\-:]*(temporada|season|temp|t)\s*(\d{1,2})[\s\-:]*(episodio|episode|ep|e)\s*(\d{1,3})\b/i);
  if(mT) return{title:cleanTitle(mT[1]),season:parseInt(mT[3],10)||0,episode:parseInt(mT[5],10)||0};
  return{title:cleanTitle(s),season:0,episode:0};
}

/* Firebase */
firebase.initializeApp(FC);
var auth=firebase.auth(), db=firebase.firestore();
function toLogin(){ window.location.replace("login.html"); }
function tsMs(x){
  if(!x) return 0;
  try{if(typeof x.toDate==="function") return x.toDate().getTime();}catch(e){}
  if(x instanceof Date) return x.getTime();
  if(typeof x==="number") return x;
  return 0;
}

auth.onAuthStateChanged(function(user){
  if(!user){ toLogin(); return; }
  db.collection(ALLOWLIST).doc(user.uid).get().then(function(snap){
    var d=snap.exists?(snap.data()||{}):{};
    if(d.enabled!==true){ return auth.signOut().then(toLogin); }
    var expMs=tsMs(d.expiresAt);
    if(!expMs){
      var st=tsMs(d.startAt)||tsMs(d.createdAt);
      if(st) expMs=st+(30*86400000);
    }
    var days=expMs?Math.max(0,Math.ceil((expMs-Date.now())/86400000)):0;
    var emailEl=$("sideEmail"),daysEl=$("sideDays"),dot=$("subDot");
    if(emailEl) emailEl.textContent=(d.email||user.email||"").split("@")[0];
    if(daysEl) daysEl.textContent=days+"d";
    if(dot){
      dot.classList.toggle("warn",days<=7&&days>3);
      dot.classList.toggle("danger",days<=3);
    }
    boot();
  }).catch(function(){ auth.signOut().then(toLogin); });
});

/* THEME */
function applyTheme(m){
  document.body.classList.toggle("light",m==="light");
  try{localStorage.setItem("theme",m);}catch(e){}
  $("btnTheme").textContent=m==="light"?"🌙":"☀️";
}
(function(){
  var t=null; try{t=localStorage.getItem("theme");}catch(e){}
  applyTheme(t||"dark");
})();
$("btnTheme").onclick=function(){
  applyTheme(document.body.classList.contains("light")?"dark":"light");
};

/* SUBCATEGORIES */
function getSubsForCat(cat){
  var map={};
  ALL.filter(function(c){return c.catKey===cat;}).forEach(function(c){
    var k=c.sub||"General";
    map[k]=(map[k]||0)+1;
  });
  return map;
}

/* SERIES INDEX */
function buildSeriesIdx(items){
  var idx={};
  items.forEach(function(it){
    var meta=it.sMeta||parseSeriesMeta(it.name||"");
    var title=cleanTitle(meta.title||it.name||"Serie");
    var key=norm(title);
    if(!idx[key]) idx[key]={title:title,logo:it.logo||"",seasons:{}};
    var sk=pad2(meta.season||0);
    if(!idx[key].seasons[sk]) idx[key].seasons[sk]=[];
    idx[key].seasons[sk].push({
      id:it.id,rawName:it.name,logo:it.logo||idx[key].logo,
      url:it.url,_season:meta.season||0,_episode:meta.episode||0
    });
    idx[key].seasons[sk].sort(function(a,b){return (a._episode||0)-(b._episode||0);});
  });
  return idx;
}

/* RENDER BREADCRUMB */
function renderBreadcrumb(){
  var bc=$("breadcrumb");
  if(!bc) return;
  var catLabel={"tv en vivo":"TV en vivo","peliculas":"Películas","series":"Series","radios":"Radios"}[CAT]||CAT;
  var parts=[{label:catLabel,action:function(){setCategory(CAT);}}];
  if(CAT==="series"){
    if(SERIES_MODE==="SEASONS"&&ACTIVE_SERIE&&SERIES_IDX){
      var s=SERIES_IDX[ACTIVE_SERIE];
      parts.push({label:s?s.title:"Serie",action:function(){goSeriesMode("SEASONS");}});
    }
    if(SERIES_MODE==="EPISODES"&&ACTIVE_SERIE&&SERIES_IDX){
      var s2=SERIES_IDX[ACTIVE_SERIE];
      parts.push({label:s2?s2.title:"Serie",action:function(){
        SERIES_MODE="SEASONS";ACTIVE_SEASON="";
        renderView();
      }});
      var sn=parseInt(ACTIVE_SEASON,10)||0;
      parts.push({label:sn>0?"Temporada "+sn:"Especiales",action:null});
    }
  } else if(SUB){
    parts.push({label:SUB,action:null});
  }
  bc.innerHTML=parts.map(function(p,i){
    var last=(i===parts.length-1);
    return (i>0?'<span class="sep">/</span>':'')
      +'<span class="bc-item'+(last?' last':'')+(p.action&&!last?' link':'')+'" data-idx="'+i+'">'+esc(p.label)+'</span>';
  }).join("");
  Array.prototype.forEach.call(bc.querySelectorAll(".bc-item[data-idx]"),function(el,i){
    var p=parts[i];
    if(p&&p.action&&!el.classList.contains("last")){
      el.onclick=p.action;
    }
  });
}

/* CHIPS */
function renderChips(subs){
  var wrap=$("chipsWrap");
  if(!wrap) return;
  var keys=Object.keys(subs).sort(function(a,b){
    return (subs[b]||0)-(subs[a]||0);
  });
  if(keys.length<=1){ wrap.style.display="none"; return; }
  wrap.style.display="flex";
  var html='<button class="chip'+(SUB===''?' active':'')+'" data-sub="">Todos <span class="chip-count">'+
    Object.values(subs).reduce(function(a,b){return a+b;},0)+'</span></button>';
  keys.forEach(function(k){
    html+='<button class="chip'+(SUB===k?' active':'')+'" data-sub="'+esc(k)+'">'+esc(k)+' <span class="chip-count">'+subs[k]+'</span></button>';
  });
  wrap.innerHTML=html;
  Array.prototype.forEach.call(wrap.querySelectorAll(".chip"),function(el){
    el.onclick=function(){
      SUB=el.getAttribute("data-sub")||"";
      FOCUS_I=0;
      renderView();
    };
  });
}

/* SECTION HEADER */
function renderSectionHeader(label,count){
  var h=$("sectionHeader");
  if(!h) return;
  h.style.display="flex";
  h.innerHTML='<div>'
    +'<div class="section-title"><span>'+esc(label)+'</span></div>'
    +(count?'<div class="section-meta">'+count+' elementos</div>':'')
    +'</div>';
}

/* GRID */
function renderGrid(items){
  var grid=$("grid");
  if(!grid) return;
  if(!items||!items.length){
    grid.innerHTML='<div class="empty-state">'
      +'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><path d="M9 10h.01M15 10h.01M9.5 15a4 4 0 0 0 5 0"/></svg>'
      +'Sin contenido</div>';
    return;
  }

  var isSeries=(CAT==="series");
  var html="";

  items.forEach(function(c,i){
    var cls="card";
    if(isSeries&&SERIES_MODE==="SERIES") cls+=" series-card";

    var poster=c.logo
      ?'<img loading="lazy" decoding="async" referrerpolicy="no-referrer" src="'+esc(c.logo)+'" alt="" onerror="this.style.display=\'none\'">'
      :'<div class="card-poster-placeholder">'+esc((c.name||"?").charAt(0).toUpperCase())+'</div>';

    var badge="";
    if(c.__type==="SEASON") badge='<div class="card-badge season">Temp.</div>';
    else if(c.__type==="EPISODE"){
      var eN=c._episode||0;
      badge='<div class="card-badge episode">E'+pad2(eN)+'</div>';
    }

    var sub2=c.__type==="SERIE"?(c.number||"")
      :c.__type==="SEASON"?(c.number||"")
      :c.__type==="EPISODE"?""
      :(c.sub||c.group||"");

    html+='<div class="'+cls+'" data-idx="'+i+'" tabindex="0" role="button">'
      +'<div class="card-poster">'+poster
      +'<div class="card-play"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>'
      +badge
      +'</div>'
      +'<div class="card-info">'
      +'<div class="card-name">'+esc(c.name)+'</div>'
      +(sub2?'<div class="card-sub">'+esc(sub2)+'</div>':'')
      +'</div>'
      +'</div>';
  });

  grid.innerHTML=html;

  Array.prototype.forEach.call(grid.querySelectorAll(".card"),function(el){
    var idx=parseInt(el.getAttribute("data-idx"),10)||0;
    el.onclick=function(){ FOCUS_I=idx; onSelect(items[idx],items); };
    el.onkeydown=function(e){
      if(e.key==="Enter"||e.keyCode===13){ e.preventDefault(); FOCUS_I=idx; onSelect(items[idx],items); }
    };
    el.onfocus=function(){ FOCUS_I=idx; };
  });

  setTimeout(function(){ focusCard(FOCUS_I); },60);
}

function focusCard(i){
  var el=document.querySelector('.card[data-idx="'+i+'"]');
  if(el){ try{el.focus();}catch(e){} try{el.scrollIntoView({block:"nearest"});}catch(e){} }
}

/* MAIN RENDER */
function renderView(){
  renderBreadcrumb();

  if(CAT==="series"){
    renderSeriesView();
    return;
  }

  var subs=getSubsForCat(CAT);
  var catLabel={"tv en vivo":"TV en vivo","peliculas":"Películas","radios":"Radios"}[CAT]||CAT;

  var list=ALL.filter(function(c){
    if(c.catKey!==CAT) return false;
    if(SUB&&c.sub!==SUB) return false;
    var q=($("search").value||"").toLowerCase();
    if(q&&String(c.name||"").toLowerCase().indexOf(q)<0) return false;
    return true;
  });

  renderChips(subs);
  renderSectionHeader(SUB||catLabel,list.length);
  renderGrid(list);
}

/* SERIES VIEW */
function renderSeriesView(){
  var chipsWrap=$("chipsWrap");
  if(chipsWrap) chipsWrap.style.display="none";

  if(SERIES_MODE==="SERIES"){
    var q=($("search").value||"").toLowerCase();
    var list=SERIES_KEYS
      .filter(function(k){
        if(!q) return true;
        return String(SERIES_IDX[k].title||"").toLowerCase().indexOf(q)>=0;
      })
      .map(function(k){
        var s=SERIES_IDX[k];
        var total=0,sc=0;
        Object.keys(s.seasons).forEach(function(sk){sc++;total+=(s.seasons[sk]||[]).length;});
        return{__type:"SERIE",__key:k,name:s.title,logo:s.logo||"",group:"Series",sub:sc+" temp · "+total+" eps",number:sc+" temp · "+total+" eps",url:""};
      });
    renderSectionHeader("Series",list.length);
    renderGrid(list);
    return;
  }

  if(SERIES_MODE==="SEASONS"){
    var sObj=SERIES_IDX[ACTIVE_SERIE];
    if(!sObj){renderGrid([]);return;}
    var sks=Object.keys(sObj.seasons).sort(function(a,b){return(parseInt(a,10)||0)-(parseInt(b,10)||0);});
    var list2=sks.map(function(sk){
      var eps=sObj.seasons[sk]||[];
      var n=parseInt(sk,10)||0;
      return{__type:"SEASON",__key:sk,name:n>0?"Temporada "+n:"Especiales",logo:sObj.logo||"",group:sObj.title,sub:eps.length+" episodios",number:eps.length+" episodios",url:""};
    });
    renderSectionHeader(sObj.title,null);
    renderGrid(list2);
    return;
  }

  if(SERIES_MODE==="EPISODES"){
    var sObj2=SERIES_IDX[ACTIVE_SERIE];
    var eps2=(sObj2&&sObj2.seasons[ACTIVE_SEASON])?sObj2.seasons[ACTIVE_SEASON]:[];
    var sn=parseInt(ACTIVE_SEASON,10)||0;
    var label2=sObj2?(sObj2.title+" · "+(sn>0?"T"+sn:"Especiales")):"Episodios";
    var list3=eps2.map(function(ep,i){
      var eN=ep._episode||0;
      return{__type:"EPISODE",name:"E"+pad2(eN||i+1)+" — "+(ep.rawName||"Episodio"),logo:ep.logo||"",group:label2,sub:"",url:ep.url,id:ep.id,_episode:ep._episode||0,_season:ep._season||0};
    });
    renderSectionHeader(label2,list3.length);
    renderGrid(list3);
  }
}

/* SELECT */
function onSelect(item,list){
  if(CAT==="series"){
    if(item.__type==="SERIE"){
      ACTIVE_SERIE=item.__key;ACTIVE_SEASON="";FOCUS_I=0;
      SERIES_MODE="SEASONS";renderView();return;
    }
    if(item.__type==="SEASON"){
      ACTIVE_SEASON=item.__key;FOCUS_I=0;
      SERIES_MODE="EPISODES";renderView();return;
    }
    if(item.__type==="EPISODE"||item.url){
      playChannel(item,list);return;
    }
    return;
  }
  playChannel(item,list);
}

function goSeriesMode(m){ SERIES_MODE=m;FOCUS_I=0;renderView(); }

function playChannel(sel,list){
  var si=0;
  for(var i=0;i<list.length;i++){if(list[i].url===sel.url){si=i;break;}}
  var payload={
    url:sel.url,
    channels:list.map(function(c){return{name:c.name,url:c.url,logo:c.logo||"",number:c.number||""};} ),
    selectedIndex:si,selectedName:sel.name||"",selectedLogo:sel.logo||"",
    selectedGroup:sel.group||"",selectedNumber:sel.number||""
  };
  if(window.AndroidBridge&&typeof window.AndroidBridge.playChannel==="function"){
    window.AndroidBridge.playChannel(JSON.stringify(payload));
  } else {
    console.log(payload);
    toast("▶ "+sel.name);
  }
}

/* CATEGORY SWITCH */
function setCategory(cat){
  CAT=norm(cat);SUB="";FOCUS_I=0;
  SERIES_MODE="SERIES";SERIES_IDX=null;SERIES_KEYS=[];ACTIVE_SERIE="";ACTIVE_SEASON="";

  Array.prototype.forEach.call(document.querySelectorAll(".side-btn"),function(b){
    b.classList.toggle("active",b.getAttribute("data-cat")===CAT);
  });

  if(CAT==="series"){
    var si=ALL.filter(function(c){return c.catKey==="series";});
    SERIES_IDX=buildSeriesIdx(si);
    SERIES_KEYS=Object.keys(SERIES_IDX).sort(function(a,b){
      return String(SERIES_IDX[a].title||"").toLowerCase()<String(SERIES_IDX[b].title||"").toLowerCase()?-1:1;
    });
  }

  renderView();
  var m=$("main");if(m)m.scrollTop=0;
}

/* KEYBOARD NAV */
function cols(){
  var g=$("grid");if(!g)return 1;
  var gw=g.clientWidth||600;
  var minW=150;
  try{
    var cs=getComputedStyle(document.documentElement).getPropertyValue("--grid-min")||"";
    var p=parseInt(cs,10);if(!isNaN(p)&&p>0)minW=p;
  }catch(e){}
  var c=Math.floor((gw+12)/(minW+12));
  return Math.max(1,c);
}

document.addEventListener("keydown",function(e){
  var ae=document.activeElement,tag=(ae&&ae.tagName||"").toLowerCase();
  if(tag==="input"||tag==="textarea") return;
  var k=e.key||"",kc=e.keyCode||0;
  var isLeft=k==="ArrowLeft"||kc===37||kc===21;
  var isRight=k==="ArrowRight"||kc===39||kc===22;
  var isUp=k==="ArrowUp"||kc===38||kc===19;
  var isDown=k==="ArrowDown"||kc===40||kc===20;
  var isOk=k==="Enter"||kc===13||kc===23;
  var isBack=k==="Escape"||kc===27||kc===4;

  if(isBack&&CAT==="series"){
    if(SERIES_MODE==="EPISODES"){e.preventDefault();SERIES_MODE="SEASONS";FOCUS_I=0;renderView();return;}
    if(SERIES_MODE==="SEASONS"){e.preventDefault();SERIES_MODE="SERIES";FOCUS_I=0;renderView();return;}
  }

  var inSide=ae&&ae.classList&&ae.classList.contains("side-btn");

  if(!inSide&&isLeft){
    var cc=cols();
    if(cc<=1||FOCUS_I%cc===0){
      e.preventDefault();
      var ab=document.querySelector('.side-btn.active');
      if(ab)try{ab.focus();}catch(ex){}
      return;
    }
  }
  if(inSide&&isRight){
    e.preventDefault();setTimeout(function(){focusCard(FOCUS_I);},30);return;
  }
  if(inSide){
    var btns=Array.prototype.slice.call(document.querySelectorAll(".side-btn"));
    var bi=btns.indexOf(ae);
    if(isUp&&bi>0){e.preventDefault();try{btns[bi-1].focus();}catch(ex){}return;}
    if(isDown&&bi<btns.length-1){e.preventDefault();try{btns[bi+1].focus();}catch(ex){}return;}
    if(isOk){e.preventDefault();setCategory(ae.getAttribute("data-cat")||CAT);return;}
    return;
  }

  var list=getActiveList();
  if(!list.length) return;
  var nc=cols();
  var nx=FOCUS_I;
  var handled=true;
  if(isRight) nx=FOCUS_I+1;
  else if(isLeft) nx=FOCUS_I-1;
  else if(isDown) nx=FOCUS_I+(nc>1?nc:1);
  else if(isUp) nx=FOCUS_I-(nc>1?nc:1);
  else if(isOk){e.preventDefault();onSelect(list[FOCUS_I],list);return;}
  else handled=false;
  if(!handled) return;
  if(nx<0)nx=0;if(nx>list.length-1)nx=list.length-1;
  if(nx!==FOCUS_I){e.preventDefault();FOCUS_I=nx;focusCard(FOCUS_I);}
},true);

function getActiveList(){
  var g=$("grid");if(!g) return[];
  var cards=Array.prototype.slice.call(g.querySelectorAll(".card"));
  return cards.map(function(c){return{__dummy:true,idx:parseInt(c.getAttribute("data-idx"),10)||0};});
}

/* SIDEBAR CLICK */
Array.prototype.forEach.call(document.querySelectorAll(".side-btn"),function(b){
  b.onclick=function(){setCategory(b.getAttribute("data-cat")||"tv en vivo");};
});

/* SEARCH */
$("search").addEventListener("input",function(){FOCUS_I=0;renderView();});

/* LOAD */
function boot(){
  toast("Cargando...");
  fetch(M3U_URL,{cache:"no-store"})
    .then(function(r){return r.text();})
    .then(function(t){
      ALL=parseM3U(t)||[];
      if(!ALL.length){toast("Sin canales");return;}
      var order=["tv en vivo","peliculas","series","radios"];
      var first="tv en vivo";
      for(var i=0;i<order.length;i++){
        if(ALL.some(function(c){return c.catKey===order[i];})){first=order[i];break;}
      }
      setCategory(first);
      toast("Listo ✓");
    })
    .catch(function(e){console.log(e);toast("Error cargando");});
}
</script>
