<style>
:root{
  --bg:#0b1522;
  --top:#0f1d2e;
  --panel:#0f1d2e;
  --panel2:#101e30;
  --card:#13263b;
  --card-focus:#1a3550;
  --line:rgba(255,255,255,.09);
  --text:#eaf3ff;
  --muted:rgba(234,243,255,.60);
  --accent:#18b6d6;
  --radius:10px;
  --shadow:0 2px 8px rgba(0,0,0,.28);
}
body.light{
  --bg:#eef3f8;--top:#fff;--panel:#fff;--panel2:#f4f8fc;
  --card:#fff;--card-focus:#e8f4ff;--line:rgba(0,0,0,.09);
  --text:#0d1e30;--muted:rgba(13,30,48,.55);

*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* LOADER — sin inset, compatible con WebKit viejo */
#loader{
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  z-index:999;
  background:var(--bg);
  display:-webkit-box;
  display:-webkit-flex;
  display:flex;
  -webkit-box-orient:vertical;
  -webkit-flex-direction:column;
  flex-direction:column;
  -webkit-box-align:center;
  -webkit-align-items:center;
  align-items:center;
  -webkit-box-pack:center;
  -webkit-justify-content:center;
  justify-content:center;
}
#loader.hide{display:none}
.loader-ring{
  width:56px;height:56px;
  border:5px solid rgba(24,182,214,.20);
  border-top-color:#18b6d6;
  border-radius:50%;
  -webkit-animation:spin .9s linear infinite;
  animation:spin .9s linear infinite;
}
@-webkit-keyframes spin{to{-webkit-transform:rotate(360deg)}}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-text{
  margin-top:18px;
  font-size:15px;font-weight:800;
  color:rgba(234,243,255,.65);
  letter-spacing:.5px;
}

/* TOPBAR */
.topbar{
  position:relative;
  z-index:20;
  height:62px;
  display:-webkit-box;
  display:-webkit-flex;
  display:flex;
  -webkit-box-align:center;
  -webkit-align-items:center;
  align-items:center;
  gap:10px;
  padding:0 14px;
  background:var(--top);
  border-bottom:1px solid var(--line);
}
.brand{
  display:-webkit-box;
  display:-webkit-flex;
  display:flex;
  -webkit-box-align:center;
  -webkit-align-items:center;
  align-items:center;
  gap:8px;
  -webkit-flex-shrink:0;
  flex-shrink:0;
}
.brand-dot{
  width:10px;height:10px;border-radius:50%;
  background:#18b6d6;
}
.brand-title{font-weight:900;font-size:15px}
.breadcrumb{
  display:-webkit-box;
  display:-webkit-flex;
  display:flex;
  -webkit-box-align:center;
  -webkit-align-items:center;
  align-items:center;
  gap:5px;
  font-size:12px;color:var(--muted);
  overflow:hidden;min-width:0;
  -webkit-box-flex:1;
  -webkit-flex:1;
  flex:1;
}
.bc-item{
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px;
}
.bc-item.clickable{cursor:pointer;color:#18b6d6}
.bc-item.last{color:var(--text);font-weight:900}
.bc-sep{opacity:.4;-webkit-flex-shrink:0;flex-shrink:0}
.search{
  -webkit-flex-shrink:0;flex-shrink:0;
  width:220px;
  padding:8px 12px;
  border-radius:10px;
  border:1px solid var(--line);
  background:rgba(255,255,255,.06);
  color:var(--text);font-weight:700;font-size:13px;

}
body.light .search{background:rgba(0,0,0,.05)}
.search:focus{border-color:#18b6d6}
.btnTheme{
  -webkit-flex-shrink:0;flex-shrink:0;

  border-radius:10px;border:1px solid var(--line);
  background:rgba(255,255,255,.05);
  color:var(--text);font-size:15px;cursor:pointer;outline:none;
}

/* LAYOUT */
.mainRow{
  display:-webkit-box;
  display:-webkit-flex;
  display:flex;
  height:calc(100% - 62px);
  overflow:hidden;
}

/* SIDEBAR */
.sidebar{
  width:160px;
  -webkit-flex:0 0 160px;
  flex:0 0 160px;
  height:100%;
  padding:12px 10px;
  background:var(--panel);
  border-right:1px solid var(--line);
  display:-webkit-box;
  display:-webkit-flex;
  display:flex;
  -webkit-box-orient:vertical;
  -webkit-flex-direction:column;
  flex-direction:column;
  overflow:hidden;
}
.sideMenu{
  display:-webkit-box;
  display:-webkit-flex;
  display:flex;
  -webkit-box-orient:vertical;
  -webkit-flex-direction:column;
  flex-direction:column;
  gap:8px;
}
.sideBtn{
  width:100%;height:68px;
  border-radius:12px;
  border:2px solid transparent;
  background:rgba(255,255,255,.04);
  color:var(--text);
  font-weight:900;font-size:13px;
  display:-webkit-box;
  display:-webkit-flex;
  display:flex;
  -webkit-box-align:center;
  -webkit-align-items:center;
  align-items:center;
  -webkit-box-pack:center;
  -webkit-justify-content:center;
  justify-content:center;
  cursor:pointer;outline:none;
  -webkit-user-select:none;user-select:none;
  -webkit-appearance:none;appearance:none;
}
body.light .sideBtn{background:rgba(0,0,0,.04)}
.sideBtn:focus{
  background:rgba(24,182,214,.10);
  border-color:rgba(24,182,214,.5);
}
.sideBtn.active{
  background:rgba(24,182,214,.14);
  border-color:#18b6d6;
  color:#18b6d6;
}
.sideFooter{
  margin-top:auto;padding-top:10px;
  border-top:1px solid var(--line);
  display:-webkit-box;
  display:-webkit-flex;
  display:flex;
  -webkit-box-orient:vertical;
  -webkit-flex-direction:column;
  flex-direction:column;
  gap:6px;font-size:11px;
}
.sideFooter .email{font-weight:900;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sideFooter .days{color:var(--muted);font-weight:700}
.sideFooter .warn{
  display:none;padding:8px;border-radius:10px;
  border:1px solid rgba(255,184,0,.3);
  background:rgba(255,184,0,.10);
  font-weight:900;font-size:10px;line-height:1.4;
}
.sideFooter.warnOn .warn{display:block}

/* CONTENT */
.content{
  -webkit-box-flex:1;
  -webkit-flex:1;
  flex:1;
  overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  background:var(--panel2);
}
.section{padding:14px 14px 8px}
.sectionTitle{font-size:20px;font-weight:900}
.sectionMeta{margin-top:3px;color:var(--muted);font-size:12px;font-weight:700}

/* BACK HINT */
.back-hint{
  display:-webkit-inline-box;
  display:-webkit-inline-flex;
  display:inline-flex;
  -webkit-box-align:center;
  -webkit-align-items:center;
  align-items:center;
  gap:6px;
  margin:0 14px 6px;
  padding:5px 12px;
  border-radius:8px;
  border:1px solid var(--line);
  background:rgba(255,255,255,.04);
  font-size:11px;font-weight:800;color:var(--muted);
  cursor:pointer;outline:none;
}
.back-hint:focus{color:#18b6d6;border-color:#18b6d6}

/* GRID — usa margin negativo como el código viejo (más compatible) */
.grid{
  display:-webkit-box;
  display:-webkit-flex;
  display:flex;
  -webkit-flex-wrap:wrap;
  flex-wrap:wrap;
  padding:8px 8px 20px;
  /* gap simulado con margin en cards */
}

/* CARD — estilo del código viejo que funcionaba */
.card{
  /* ancho fijo, sin CSS vars para TV viejo */
  width:190px;
  margin:5px;
  background:rgba(14,37,60,.98);
  border:1px solid rgba(255,255,255,.10);
  border-radius:14px;
  cursor:pointer;
  outline:none;
  -webkit-user-select:none;user-select:none;
  box-shadow:0 4px 12px rgba(0,0,0,.30);
  position:relative;
  /* aspect ratio via padding trick — igual que el viejo */
}
body.light .card{background:#fff;border-color:rgba(0,0,0,.10)}
.card:before{content:"";display:block;padding-top:100%}
.card:focus{
  border-color:rgba(34,199,230,.85);
  box-shadow:0 0 0 2px rgba(34,199,230,.22),0 4px 12px rgba(0,0,0,.30);
}
.cardInner{
  position:absolute;
  left:10px;right:10px;top:10px;bottom:10px;
  display:-webkit-box;
  display:-webkit-flex;
  display:flex;
  -webkit-box-orient:vertical;
  -webkit-flex-direction:column;
  flex-direction:column;
  gap:8px;
  min-width:0;
}
/* logo box — igual que el viejo */
.logo{
  -webkit-flex:0 0 auto;
  flex:0 0 auto;
  height:72%;
  border-radius:14px;
  border:1px solid rgba(255,255,255,.10);
  background:rgba(255,255,255,.05);
  display:-webkit-box;
  display:-webkit-flex;
  display:flex;
  -webkit-box-align:center;
  -webkit-align-items:center;
  align-items:center;
  -webkit-box-pack:center;
  -webkit-justify-content:center;
  justify-content:center;
  overflow:hidden;
}
body.light .logo{background:#f0f6ff;border-color:rgba(0,0,0,.08)}
/* IMAGEN: sin loading lazy, sin referrerPolicy — máxima compatibilidad */
.logo img{
  max-width:98%;
  max-height:98%;
  object-fit:contain;
  display:block;
}
.logo .ph{
  font-size:28px;font-weight:900;
  color:#18b6d6;opacity:.75;
}
.meta{
  -webkit-flex:1;flex:1;
  min-width:0;
  display:-webkit-box;
  display:-webkit-flex;
  display:flex;
  -webkit-box-orient:vertical;
  -webkit-flex-direction:column;
  flex-direction:column;
  -webkit-box-pack:end;
  -webkit-justify-content:flex-end;
  justify-content:flex-end;
}
.name{
  font-weight:900;font-size:13px;line-height:1.15;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.group{
  font-size:11px;color:var(--muted);margin-top:4px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.card-badge{
  position:absolute;top:8px;right:8px;
  font-size:9px;font-weight:900;
  padding:2px 7px;border-radius:999px;
  border:1px solid rgba(24,182,214,.35);
  background:rgba(24,182,214,.14);
  color:#18b6d6;
}

/* EMPTY */
.empty{padding:28px 14px;color:var(--muted);font-weight:900;font-size:14px}

/* TOAST */
.toast{
  position:fixed;
  left:50%;bottom:18px;
  /* sin transform para TV viejo */
  margin-left:-80px;
  width:160px;
  text-align:center;
  background:rgba(0,0,0,.85);color:#fff;
  padding:9px 16px;border-radius:12px;
  font-size:12px;font-weight:700;
  opacity:0;pointer-events:none;
  z-index:200;
}
.toast.show{opacity:1}

@media(max-width:700px){
  .card{width:46vw}
  .sidebar{width:130px;-webkit-flex:0 0 130px;flex:0 0 130px}
  .search{width:38vw}
}
@media(max-width:480px){
  .card{width:44vw}
  .sidebar{width:110px;-webkit-flex:0 0 110px;flex:0 0 110px}
  .brand-title{display:none}
}
</style>
</head>
<body>

<div id="loader">
  <div class="loader-ring"></div>
  <div class="loader-text">Cargando canales…</div>
</div>

<header class="topbar">
  <div class="brand">
    <div class="brand-dot"></div>
    <div class="brand-title">StreamTV</div>
  </div>
  <div class="breadcrumb" id="breadcrumb"></div>
  <input id="search" class="search" placeholder="Buscar…" autocomplete="off" tabindex="0"/>
  <button id="btnTheme" class="btnTheme" type="button" title="Tema">☀️</button>
</header>

<div class="mainRow">
  <aside class="sidebar" id="sidebar">
    <div class="sideMenu" id="sideMenu">
      <button class="sideBtn active" type="button" tabindex="0" data-cat="tv en vivo">📺 TV en vivo</button>
      <button class="sideBtn" type="button" tabindex="0" data-cat="peliculas">🎬 Películas</button>
      <button class="sideBtn" type="button" tabindex="0" data-cat="series">📂 Series</button>
      <button class="sideBtn" type="button" tabindex="0" data-cat="radios">📻 Radios</button>
    </div>
    <div class="sideFooter" id="sideFooter">
      <div class="email" id="userEmail">—</div>
      <div class="days" id="daysLeft">—</div>
      <div class="warn" id="renewWarn">Renovar suscripción pronto.</div>
    </div>
  </aside>

  <main class="content" id="content">
    <div class="section">
      <div class="sectionTitle" id="sectionTitle">Contenido</div>
      <div class="sectionMeta" id="sectionMeta"></div>
    </div>
    <div id="backHintWrap"></div>
    <div class="grid" id="grid"></div>
    <div class="empty" id="empty" style="display:none"></div>
  </main>
</div>

<div id="toast" class="toast"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script>
/* ===== CONFIG ===== */
var FB_CFG={
  apiKey:"AIzaSyBKSdaRAQTN-Gen0k4WerLu1GvBLKzjZlQ",
  authDomain:"aweme-46b1e.firebaseapp.com",
  projectId:"aweme-46b1e",
  storageBucket:"aweme-46b1e.firebasestorage.app",
  messagingSenderId:"762479825387",
  appId:"1:762479825387:web:8ffb3a629c0eb9f52fc9ae"
};
var ALLOWLIST="allowlist";
var M3U_URL="https://jonatan1000-4.github.io/mi_app_rv22/canales.m3u";
var LAST_CH_KEY="tv_last_channel";

/* ===== STATE ===== */
var ALL=[], CURRENT_LIST=[], ACTIVE_INDEX=0;
var CURRENT_CATEGORY="tv en vivo", CURRENT_SUBCATEGORY="", VIEW_MODE="SUBCATEGORIES";
var SERIES_MODE="SERIES", SERIES_INDEX=null, SERIES_KEYS=[];
var ACTIVE_SERIES_KEY="", ACTIVE_SEASON_KEY="";
var INDEX_BY_CAT={}, SUBCAT_CARDS={};

/*
  RENDER_TOKEN: cancela renders anteriores cuando se inicia uno nuevo.
  RENDER_BUSY: bloquea navegación mientras se está renderizando el primer chunk.
  Esto evita el auto-click por focus disparado durante el render.
*/
var RENDER_TOKEN=0;
var RENDER_BUSY=false;
var CHUNK=30; /* más grande = menos rAF = menos foco intermedio */

/* ===== CARD WIDTH — valor fijo, no CSS var (TV viejo no lee vars bien) ===== */
var CARD_W=190;
var CARD_M=5; /* margin por lado */

/* ===== KEYCODES ===== */
var KC={LEFT:37,UP:38,RIGHT:39,DOWN:40,ENTER:13,DPAD_L:21,DPAD_U:19,DPAD_R:22,DPAD_D:20,DPAD_OK:23,BACK:4,ESC:27};
function isL(k,c){return k==="ArrowLeft"||c===KC.LEFT||c===KC.DPAD_L}
function isR(k,c){return k==="ArrowRight"||c===KC.RIGHT||c===KC.DPAD_R}
function isU(k,c){return k==="ArrowUp"||c===KC.UP||c===KC.DPAD_U}
function isD(k,c){return k==="ArrowDown"||c===KC.DOWN||c===KC.DPAD_D}
function isOK(k,c){return k==="Enter"||c===KC.ENTER||c===KC.DPAD_OK}
function isBK(k,c){return k==="Escape"||c===KC.ESC||c===KC.BACK}

/* ===== UTILS ===== */
function $(i){return document.getElementById(i)}
function escHtml(s){
  s=String(s==null?"":s);
  return s.replace(/[&<>"']/g,function(c){return{"&":"&amp;","<​":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c]});
}
function norm(s){
  s=String(s||"");
  try{s=s.normalize("NFD").replace(/[\u0300-\u036f]/g,"")}catch(e){}
  return s.trim().toLowerCase();
}
function pad2(n){n=parseInt(n,10)||0;return(n<10?"0":"")+n}
function debounce(fn,w){
  var t=0;
  return function(){
    var a=arguments;
    clearTimeout(t);
    t=setTimeout(function(){fn.apply(null,a)},w||200);
  };
}
function toast(t){
  var el=$("toast");if(!el)return;
  el.textContent=t;el.className="toast show";
  clearTimeout(window.__tt);
  window.__tt=setTimeout(function(){el.className="toast"},1400);
}
function setEmpty(m){
  var e=$("empty");if(!e)return;
  e.textContent=m||"";
  e.style.display=m?"block":"none";
}
function setSection(t,m){
  if($("sectionTitle"))$("sectionTitle").textContent=t||"";
  if($("sectionMeta"))$("sectionMeta").textContent=m||"";
}
function getCatLabel(c){
  return{"tv en vivo":"TV en vivo","peliculas":"Películas","series":"Series","radios":"Radios"}[c]||"Contenido";
}
function hideLoader(){
  var l=$("loader");
  if(l)l.className="hide"; /* display:none via class */
}

/* ===== COLS — calculado con JS puro, sin CSS vars ===== */
function getCols(){
  var grid=$("grid");
  if(!grid)return 1;
  var gw=grid.clientWidth||300;
  var cellW=CARD_W+(CARD_M*2);
  var cols=Math.floor(gw/cellW);
  return cols<1?1:cols;
}

/* ===== THEME ===== */
function applyTheme(m){
  var dark=(m==="dark");
  document.body.className=dark?"dark":"light";
  try{localStorage.setItem("theme",dark?"dark":"light")}catch(e){}
  var b=$("btnTheme");if(b)b.textContent=dark?"☀️":"🌙";
}
(function(){
  var s=null;try{s=localStorage.getItem("theme")}catch(e){}
  applyTheme(s==="light"?"light":"dark");
})();
$("btnTheme").onclick=function(){
  applyTheme(document.body.className==="dark"?"light":"dark");
};

/* ===== LAST CHANNEL ===== */
function saveLastChannel(p){try{localStorage.setItem(LAST_CH_KEY,JSON.stringify(p))}catch(e){}}
function loadLastChannel(){try{var s=localStorage.getItem(LAST_CH_KEY);return s?JSON.parse(s):null}catch(e){return null}}
function tryAutoplay(){
  var last=loadLastChannel();
  if(!last||!last.url)return;
  if(window.AndroidBridge&&typeof window.AndroidBridge.playChannel==="function"){
    window.AndroidBridge.playChannel(JSON.stringify(last));
  }
}

/* ===== FIREBASE ===== */
firebase.initializeApp(FB_CFG);
var auth=firebase.auth(),db=firebase.firestore();
function goLogin(){window.location.replace("login.html")}
function tsMs(x){
  if(!x)return 0;
  try{if(typeof x.toDate==="function")return x.toDate().getTime()}catch(e){}
  if(x instanceof Date)return x.getTime();
  if(typeof x==="number")return x;
  return 0;
}
function renderFooter(email,expMs){
  var eEl=$("userEmail"),dEl=$("daysLeft"),ft=$("sideFooter"),wEl=$("renewWarn");
  if(eEl)eEl.textContent=email||"—";
  if(!expMs){if(dEl)dEl.textContent="—";return}
  var days=Math.max(0,Math.ceil((expMs-Date.now())/86400000));
  if(dEl)dEl.textContent="Vence en "+days+"d";
  if(ft)ft.className="sideFooter"+(days<=3?" warnOn":"");
  if(wEl&&days<=3)wEl.textContent="Quedan "+days+" día"+(days===1?"":"s")+". Renovar.";
}
auth.onAuthStateChanged(function(user){
  if(!user){goLogin();return}
  db.collection(ALLOWLIST).doc(user.uid).get().then(function(snap){
    var d=snap.exists?(snap.data()||{}):{};
    if(d.enabled!==true){auth.signOut().then(goLogin);return}
    var exp=tsMs(d.expiresAt)||(tsMs(d.startAt||d.createdAt)+30*86400000);
    renderFooter(d.email||user.email||"",exp||0);
    clearInterval(window.__subT);
    window.__subT=setInterval(function(){renderFooter(d.email||user.email||"",exp||0)},1800000);
    boot();
  }).catch(function(){toast("Error de acceso");auth.signOut().then(goLogin)});
});

/* ===== PARSE ===== */
function parseCatSub(group,name){
  var g=String(group||""),gn=norm(g),full=norm(g+" "+(name||""));
  var cat="tv en vivo";
  if(gn.indexOf("pelicula")>=0||gn.indexOf("movie")>=0||gn.indexOf("film")>=0)cat="peliculas";
  else if(gn.indexOf("serie")>=0&&gn.indexOf("tv en vivo")<0)cat="series";
  else if(gn.indexOf("radio")>=0||gn.indexOf(" fm")>=0||gn.indexOf(" am")>=0||gn==="fm"||gn==="am")cat="radios";
  else if(/\bs\d{1,2}\s?e\d{1,2}\b/i.test(full)||/\b\d+x\d+\b/i.test(full)||full.indexOf("temporada")>=0||full.indexOf("episodio")>=0)cat="series";
  var sub=g.indexOf(" - ")>=0?g.split(" - ").slice(1).join(" - ").trim():g.trim();
  return{catKey:cat,sub:sub||"General"};
}
function cleanT(t){
  return String(t||"").replace(/[_\-|]+/g," ").replace(/\b(1080p|720p|480p|4k|uhd|hdr|latino|castellano|espanol|sub|subs)\b/ig,"").replace(/\s+/g," ").trim();
}
function parseSeriesMeta(raw){
  var s=cleanT(String(raw||""));
  var m=s.match(/^(.*?)[\s\-:]*(temporada|season|temp|t)\s*(\d{1,2})[\s\-:]*(episodio|episode|ep|e)\s*(\d{1,3})\b/i);
  if(m)return{title:cleanT(m[1]),season:parseInt(m[3],10)||0,episode:parseInt(m[5],10)||0};
  m=s.match(/^(.*?)[\s\-:]*[sS]\s*(\d{1,2})\s*[\s\-:]*[eE]\s*(\d{1,3})\b/);
  if(m)return{title:cleanT(m[1]),season:parseInt(m[2],10)||0,episode:parseInt(m[3],10)||0};
  m=s.match(/^(.*?)[\s\-:]*(\d{1,2})\s*x\s*(\d{1,3})\b/i);
  if(m)return{title:cleanT(m[1]),season:parseInt(m[2],10)||0,episode:parseInt(m[3],10)||0};
  return{title:cleanT(s),season:0,episode:0};
}
function parseM3U(text){
  text=(text||"").replace(/^\uFEFF/,"");
  var lines=text.split(/\r?\n/),out=[],name="",logo="",group="",id="",chno="";
  for(var i=0;i<lines.length;i++){
    var line=(lines[i]||"").trim();if(!line)continue;
    if(line.indexOf("#EXTINF")===0){
      name=line.split(",").slice(1).join(",").trim()||"Canal";
      logo="";group="";id="";chno="";
      var re=/([\w-]+)\s*=\s*"([^"]*)"/g,m;
      while((m=re.exec(line))!==null){
        if(m[1]==="tvg-logo")logo=m[2];
        if(m[1]==="group-title")group=m[2];
        if(m[1]==="tvg-id")id=m[2];
        if(m[1]==="tvg-chno")chno=m[2];
      }
    }else if(line.charAt(0)!=="#"){
      var url=String(line).split(",")[0].trim();
      var cs=parseCatSub(group,name);
      out.push({
        id:id||name||("ch_"+i),name:name||"Canal",logo:logo||"",
        group:group||"Otros",catKey:cs.catKey,sub:cs.sub,
        number:chno||"",url:url,
        sMeta:cs.catKey==="series"?parseSeriesMeta(name):null
      });
      name="";logo="";group="";id="";chno="";
    }
  }
  return out;
}

/* ===== BUILD INDEXES ===== */
function buildIndexes(chs){
  INDEX_BY_CAT={"tv en vivo":{},"peliculas":{},"series":{},"radios":{}};
  SUBCAT_CARDS={"tv en vivo":[],"peliculas":[],"series":[],"radios":[]};
  var tmp={"tv en vivo":{},"peliculas":{},"series":{},"radios":{}};
  for(var i=0;i<chs.length;i++){
    var c=chs[i];
    if(!INDEX_BY_CAT[c.catKey])INDEX_BY_CAT[c.catKey]={};
    if(!INDEX_BY_CAT[c.catKey][c.sub])INDEX_BY_CAT[c.catKey][c.sub]=[];
    INDEX_BY_CAT[c.catKey][c.sub].push(c);
    if(!tmp[c.catKey][c.sub]){
      tmp[c.catKey][c.sub]={__type:"SUBCATEGORY",name:c.sub,logo:c.logo||"",group:getCatLabel(c.catKey),number:"1",count:1};
    }else{
      tmp[c.catKey][c.sub].count++;
      tmp[c.catKey][c.sub].number=String(tmp[c.catKey][c.sub].count);
      if(!tmp[c.catKey][c.sub].logo&&c.logo)tmp[c.catKey][c.sub].logo=c.logo;
    }
  }
  var cats=["tv en vivo","peliculas","series","radios"];
  for(var ci=0;ci<cats.length;ci++){
    var cat=cats[ci];
    var arr=[];
    var keys=Object.keys(tmp[cat]);
    for(var ki=0;ki<keys.length;ki++)arr.push(tmp[cat][keys[ki]]);
    arr.sort(function(a,b){return(b.count||0)-(a.count||0)});
    SUBCAT_CARDS[cat]=arr;
  }
  buildSeriesIdx();
}
function buildSeriesIdx(){
  var items=ALL.filter(function(c){return c.catKey==="series"}),idx={};
  for(var i=0;i<items.length;i++){
    var it=items[i],meta=it.sMeta||parseSeriesMeta(it.name||"");
    var title=cleanT((meta.title||it.name||"Serie").trim())||cleanT(it.name||"Serie");
    var key=norm(title);
    if(!idx[key])idx[key]={title:title,logo:it.logo||"",seasons:{}};
    var sk=pad2(parseInt(meta.season,10)||0);
    if(!idx[key].seasons[sk])idx[key].seasons[sk]=[];
    idx[key].seasons[sk].push({
      id:it.id,rawName:it.name,logo:it.logo||idx[key].logo||"",
      group:it.group,number:it.number||"",url:it.url,
      _season:parseInt(meta.season,10)||0,_episode:parseInt(meta.episode,10)||0
    });
  }
  var ks=Object.keys(idx);
  for(var ki=0;ki<ks.length;ki++){
    var sks=Object.keys(idx[ks[ki]].seasons);
    for(var si=0;si<sks.length;si++){
      idx[ks[ki]].seasons[sks[si]].sort(function(a,b){
        var ae=a._episode||0,be=b._episode||0;
        return ae!==be?ae-be:String(a.rawName||"").localeCompare(String(b.rawName||""));
      });
    }
  }
  SERIES_INDEX=idx;
  SERIES_KEYS=Object.keys(idx).sort(function(a,b){
    return String(idx[a].title||"").toLowerCase()<String(idx[b].title||"").toLowerCase()?-1:1;
  });
}

/* ===== RENDER — sin focus durante chunks, solo al final ===== */
function renderListChunked(list,onSelect){
  var grid=$("grid");
  var token=++RENDER_TOKEN;
  var content=$("content");

  CURRENT_LIST=list.slice();
  RENDER_BUSY=true;
  grid.innerHTML="";
  setEmpty("");
  if(content)content.scrollTop=0;

  if(!list.length){
    RENDER_BUSY=false;
    setEmpty("Sin contenido");
    return;
  }

  if(ACTIVE_INDEX>=list.length)ACTIVE_INDEX=Math.max(0,list.length-1);
  if(ACTIVE_INDEX<0)ACTIVE_INDEX=0;

  var i=0;

  function step(){
    if(token!==RENDER_TOKEN){RENDER_BUSY=false;return}

    var frag=document.createDocumentFragment();
    var max=Math.min(i+CHUNK,list.length);

    for(;i<max;i++){
      (function(idx){
        var item=list[idx];
        var card=createCard(item,idx);

        /* onclick: usa idx capturado en closure */
        card.onclick=function(e){
          if(RENDER_BUSY)return; /* bloquea click durante render */
          ACTIVE_INDEX=idx;
          onSelect(item,list,idx);
        };

        /*
          onfocus: SOLO actualiza ACTIVE_INDEX.
          NO llama onSelect. Esto evita el auto-click.
        */
        card.onfocus=function(){
          ACTIVE_INDEX=idx;
        };

        card.addEventListener("keydown",function(ev){
          var k=ev.key||"",c=ev.keyCode||0;
          if(isOK(k,c)){
            ev.preventDefault();
            ev.stopPropagation();
            if(RENDER_BUSY)return;
            ACTIVE_INDEX=idx;
            onSelect(item,list,idx);
          }
        },true);

        frag.appendChild(card);
      })(i);
    }

    grid.appendChild(frag);

    if(i<list.length){
      /* más chunks pendientes: NO hacer focus todavía */
      requestAnimationFrame(step);
    }else{
      /* render completo: ahora sí hacer focus */
      RENDER_BUSY=false;
      setTimeout(function(){
        if(token===RENDER_TOKEN)focusByIdx(ACTIVE_INDEX);
      },60);
    }
  }

  requestAnimationFrame(step);
}

/* ===== FOCUS ===== */
function focusByIdx(idx){
  var grid=$("grid");if(!grid)return;
  var el=grid.querySelector('.card[data-idx="'+idx+'"]');if(!el)return;
  try{el.focus()}catch(e){}
  try{
    if(el.scrollIntoView){
      try{el.scrollIntoView({block:"nearest",inline:"nearest"})}
      catch(e2){el.scrollIntoView()}
    }
  }catch(e){}
}
function focusSideBtn(){
  var b=document.querySelector('.sideBtn[data-cat="'+CURRENT_CATEGORY+'"]')||document.querySelector(".sideBtn");
  if(b)try{b.focus()}catch(e){}
}
function moveSideFocus(d){
  var btns=[];
  var all=document.querySelectorAll(".sideBtn");
  for(var i=0;i<all.length;i++)btns.push(all[i]);
  if(!btns.length)return;
  var ae=document.activeElement,idx=-1;
  for(var i=0;i<btns.length;i++){if(btns[i]===ae){idx=i;break}}
  if(idx<0){focusSideBtn();return}
  var nx=idx+d;
  if(nx<0)nx=0;if(nx>btns.length-1)nx=btns.length-1;
  if(nx!==idx)try{btns[nx].focus()}catch(e){}
}

/* ===== SIDEBAR ===== */
function initSidebar(){
  var all=document.querySelectorAll(".sideBtn");
  for(var i=0;i<all.length;i++){
    (function(btn){
      btn.onclick=function(){setActiveCategory(btn.getAttribute("data-cat"))};
      btn.addEventListener("keydown",function(ev){
        var k=ev.key||"",c=ev.keyCode||0;
        if(isU(k,c)){ev.preventDefault();moveSideFocus(-1);return}
        if(isD(k,c)){ev.preventDefault();moveSideFocus(1);return}
        if(isOK(k,c)){ev.preventDefault();setActiveCategory(btn.getAttribute("data-cat"));return}
        if(isR(k,c)){ev.preventDefault();setTimeout(function(){focusByIdx(ACTIVE_INDEX)},40);return}
      },true);
    })(all[i]);
  }
}

/* ===== REMOTE NAV ===== */
function enableRemoteNav(){
  if(window.__rnav)return;window.__rnav=true;

  document.addEventListener("keydown",function(e){
    var ae=document.activeElement;
    var tag=(ae&&ae.tagName)?ae.tagName.toLowerCase():"";
    if(tag==="input"||tag==="textarea")return;

    var kc=e.keyCode||0,key=e.key||"";
    var inSide=ae&&ae.classList&&ae.classList.contains("sideBtn");

    /* BACK */
    if(isBK(key,kc)){
      if(goBack()){e.preventDefault();return}
    }

    /* Desde grid: izquierda en primera columna → sidebar */
    if(!inSide&&isL(key,kc)){
      if(!CURRENT_LIST.length)return;
      var cols=getCols();
      var atFirst=(cols<=1)?(ACTIVE_INDEX===0):((ACTIVE_INDEX%cols)===0);
      if(atFirst){e.preventDefault();focusSideBtn();return}
    }

    /* Desde sidebar: derecha → grid */
    if(inSide&&isR(key,kc)){
      e.preventDefault();
      setTimeout(function(){focusByIdx(ACTIVE_INDEX)},40);
      return;
    }

    /* Enter en grid */
    if(!inSide&&isOK(key,kc)){
      if(!CURRENT_LIST.length||RENDER_BUSY)return;
      e.preventDefault();
      var item=CURRENT_LIST[ACTIVE_INDEX];
      if(item){
        var card=document.querySelector('.card[data-idx="'+ACTIVE_INDEX+'"]');
        if(card)card.click();
      }
      return;
    }

    if(inSide)return;
    if(!CURRENT_LIST.length||RENDER_BUSY)return;

    /* Navegación direccional */
    var cols2=getCols();
    var nx=ACTIVE_INDEX,handled=true;
    if(isR(key,kc))nx=ACTIVE_INDEX+1;
    else if(isL(key,kc))nx=ACTIVE_INDEX-1;
    else if(isD(key,kc))nx=ACTIVE_INDEX+cols2;
    else if(isU(key,kc))nx=ACTIVE_INDEX-cols2;
    else handled=false;

    if(!handled)return;
    e.preventDefault();

    if(nx<0)nx=0;
    if(nx>CURRENT_LIST.length-1)nx=CURRENT_LIST.length-1;

    if(nx!==ACTIVE_INDEX){
      ACTIVE_INDEX=nx;
      focusByIdx(ACTIVE_INDEX);
    }
  },true);
}

    .then(function(r){return r.text()})
    .then(function(text){

      if(!ALL.length){hideLoader();setEmpty("Sin canales");return}
      buildIndexes(ALL);
      var order=["tv en vivo","peliculas","series","radios"],found="tv en vivo";
      for(var i=0;i<order.length;i++){
        if(SUBCAT_CARDS[order[i]]&&SUBCAT_CARDS[order[i]].length){found=order[i];break}
      }
      setActiveCategory(found);
      hideLoader();
      window.addEventListener("resize",function(){
        setTimeout(function(){focusByIdx(ACTIVE_INDEX)},80);
      });
    })
    .catch(function(e){
      console.log(e);
      hideLoader();
      setEmpty("Error al cargar canales");
      toast("Error de red");
    });
}
</script>
